<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilenVocab | 極簡英文練習</title>
    
    <script>
        window.isYgApiReady = false;
        window.onYouglishAPIReady = function() {
            window.isYgApiReady = true;
            console.log("YouGlish API 準備就緒");
        };
    </script>
    <script defer src="https://youglish.com/api/widget/js/widget.js"></script>
    
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --text-main: #e0e0e0;
            --text-sub: #888888;
            --accent: #ffffff;
            --accent-hover: #cccccc;
            --border: #333333;
            --success: #4caf50;
            --error: #f44336;
            --btn-primary: #3b82f6; 
            --btn-primary-hover: #2563eb;
            --btn-youglish: #e62117; 
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --warning: #ff9800;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        header { margin-bottom: 40px; text-align: center; letter-spacing: 2px; text-transform: uppercase; font-weight: 200; }
        h1 { font-size: 1.5rem; margin: 0; color: var(--accent); }
        h2 { font-size: 1.2rem; font-weight: 400; margin-bottom: 20px; }

        /* Navigation Bar */
        .nav-bar { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; min-height: 40px; }
        .nav-bar-right { display: flex; align-items: center; justify-content: flex-end; gap: 10px; flex-shrink: 0; }
        
        .btn-icon { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 1rem; transition: color 0.3s; padding: 5px; white-space: nowrap; }
        .btn-icon:hover { color: var(--accent); }
        
        .export-quiz-btn { 
            font-size: 0.85rem; 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 5px 12px; 
            border-radius: 20px; 
            background: transparent; 
            cursor: pointer; 
            white-space: nowrap !important; 
            display: inline-block !important; 
            visibility: visible !important;
            opacity: 1 !important;
            transition: all 0.2s;
            z-index: 10;
        }
        .export-quiz-btn:hover { background: var(--accent); color: var(--bg-color); }

        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; transition: transform 0.2s, border-color 0.2s; }
        .book-item { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--card-bg); }
        .book-item:hover { border-color: var(--text-sub); }
        .book-item.selected { border-color: var(--accent); background-color: #222; }
        
        .word-item { display: flex; justify-content: space-between; font-size: 0.95rem; padding: 10px 0; border-bottom: 1px solid #222; }
        .word-item:last-child { border-bottom: none; }
        .word-en { font-weight: 600; color: var(--accent); }
        .word-zh { color: var(--text-sub); font-size: 0.9rem; }

        input[type="text"], textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text-main); padding: 10px 0; font-size: 1rem; margin-bottom: 20px; transition: border-color 0.3s; font-family: var(--font-family); }
        input[type="text"]:focus, textarea:focus { border-bottom-color: var(--accent); }
        textarea { border: 1px solid var(--border); border-radius: 8px; padding: 10px; min-height: 120px; margin-top: 10px; font-size: 0.9rem; line-height: 1.5; resize: vertical; }

        .btn { background-color: var(--accent); color: var(--bg-color); border: none; padding: 12px 24px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 0.9rem; width: 100%; margin-top: 10px; transition: background 0.3s; }
        .btn:hover { background-color: var(--accent-hover); }
        .btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--accent); }
        .btn-small { padding: 5px 10px; font-size: 0.8rem; width: auto; margin: 0; }
        .btn-delete { background: transparent; color: #555; border: 1px solid #333; }
        .btn-delete:hover { color: var(--error); border-color: var(--error); background: transparent; }
        .btn-yg { border-color: var(--btn-youglish); color: var(--text-main); }
        .btn-yg:hover { background-color: var(--btn-youglish); border-color: var(--btn-youglish); color: white; }

        .practice-area { text-align: center; margin-top: 40px; position: relative; }
        .question-text { font-size: 2rem; margin-bottom: 30px; font-weight: 600; }
        .hint-text { color: var(--text-sub); margin-bottom: 10px; font-style: italic; height: 20px;}
        .progress-text { color: var(--text-sub); margin-top: 20px; font-size: 0.8rem; }

        #feedback-area, #mcq-feedback-area, #speaking-feedback-area { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            animation: fadeIn 0.3s ease; 
            width: 100%; 
        }
        
        .big-icon { font-size: 4rem; margin-bottom: 15px; font-weight: bold; }
        .icon-correct { color: var(--success); }
        .icon-wrong { color: var(--error); }
        .result-status { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; }
        .status-correct { color: var(--success); }
        .status-wrong { color: var(--error); }
        .answer-reveal { font-size: 1.5rem; margin-bottom: 10px; color: var(--accent); display: flex; align-items: center; gap: 10px; justify-content: center; }
        .tts-btn-large { background: none; border: none; cursor: pointer; font-size: 1.5rem; color: var(--text-sub); }
        .tts-btn-large:hover { color: var(--accent); }
        .btn-next-big { background-color: var(--btn-primary); color: white; font-size: 1.1rem; padding: 15px; margin-top: 30px; border-radius: 8px; width: 100%; }
        .btn-next-big:hover { background-color: var(--btn-primary-hover); }

        .mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-mcq { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); padding: 20px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; word-break: break-all; }
        .btn-mcq:hover { border-color: var(--accent); transform: translateY(-2px); }
        @media (max-width: 480px) { .mcq-grid { grid-template-columns: 1fr; } }

        /* ======= Speaking Mode Styles ======= */
        .mic-btn { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--border); background: var(--card-bg); color: var(--text-main); font-size: 2.5rem; cursor: pointer; margin: 20px auto; display: flex; align-items: center; justify-content: center; transition: all 0.3s; }
        .mic-btn.listening { border-color: var(--error); color: var(--error); box-shadow: 0 0 20px rgba(244, 67, 54, 0.4); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .speaking-status { color: var(--text-sub); margin-top: 10px; height: 20px; }
        .score-circle { font-size: 3rem; font-weight: 800; color: var(--success); margin-bottom: 10px; }

        /* ======= Puzzle Mode Styles ======= */
        .puzzle-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; min-height: 60px; }
        .letter-tile { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; border: 1px solid var(--border); border-radius: 8px; font-weight: bold; font-size: 1.2rem; cursor: pointer; background: var(--card-bg); color: var(--text-main); user-select: none; }
        .letter-tile:hover { border-color: var(--accent); }
        .letter-tile.empty { border: 1px dashed #333; color: transparent; cursor: default; }
        
        /* ======= Memory Mode Styles ======= */
        .memory-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .memory-card { background-color: transparent; height: 80px; perspective: 1000px; cursor: pointer; }
        .memory-inner { position: relative; width: 100%; height: 100%; text-align: center; transition: transform 0.6s; transform-style: preserve-3d; border-radius: 8px; }
        .memory-card.flipped .memory-inner { transform: rotateY(180deg); }
        .memory-card.matched .memory-inner { transform: rotateY(180deg); opacity: 0.5; }
        .memory-front, .memory-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; align-items: center; justify-content: center; border-radius: 8px; padding: 5px; font-size: 0.8rem; border: 1px solid var(--border); }
        .memory-back { background-color: #222; color: var(--text-sub); font-size: 1.5rem; }
        .memory-front { background-color: var(--card-bg); color: var(--accent); transform: rotateY(180deg); word-break: break-all; line-height: 1.2; }

        /* ======= YouGlish Mode Styles ======= */
        .yg-open-btn { display: block; width: 100%; padding: 20px; margin-bottom: 15px; background: #1a0000; border: 2px solid var(--btn-youglish); border-radius: 12px; color: white; font-size: 1rem; cursor: pointer; text-align: center; transition: background 0.2s; text-decoration: none; }
        .yg-open-btn:hover { background: #2d0000; }
        .yg-open-btn .yg-btn-label { font-size: 0.85rem; color: #aaa; margin-top: 5px; }
        .yg-tip { color: var(--text-sub); font-size: 0.82rem; margin-bottom: 20px; line-height: 1.5; }
        .yg-word-display { font-size: 2.5rem; font-weight: bold; color: var(--accent); margin-bottom: 5px; }
        .yg-zh-display { font-size: 1.2rem; color: var(--text-sub); margin-bottom: 20px; }

        .group-title { font-size: 1.1rem; color: var(--accent); margin: 25px 0 10px 0; padding-bottom: 5px; border-bottom: 1px solid #333; text-align: left; }

        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 10px; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
        input[type="checkbox"] { accent-color: var(--accent); transform: scale(1.2); }
        .mode-badge { font-size: 0.75rem; background: var(--border); padding: 2px 8px; border-radius: 4px; color: var(--text-sub); }
        .mode-badge.active { background: var(--warning); color: #000; font-weight: bold; }
        .import-section { margin-top: 15px; border: 1px dashed var(--border); padding: 15px; border-radius: 8px; }
        .import-trigger { font-size: 0.85rem; color: var(--text-sub); text-decoration: underline; cursor: pointer; text-align: right; display: block; margin-bottom: 5px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>SilenVocab</h1>
    </header>

    <div id="view-home">
        <div class="card" style="text-align: center; padding: 30px 20px; border-color: var(--border);">
            <div id="home-book-summary" style="font-size: 1.1rem; margin-bottom: 20px;">
                尚未選擇單字簿
            </div>
            <button class="btn btn-outline" style="border-color: var(--accent); color: var(--accent);" onclick="openBookSelect()">📚 選擇與管理單字簿</button>
        </div>
        
        <div style="margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h2>開始練習</h2>
            <div class="checkbox-wrapper" style="margin-bottom: 15px;" onclick="toggleSequential()">
                <input type="checkbox" id="sequential-toggle" style="pointer-events: none;">
                <label for="sequential-toggle" style="flex:1; cursor:pointer;">
                    開啟「循序漸進」模式 <span style="font-size:0.8rem; color:var(--text-sub);">(錯誤即重來)</span>
                </label>
            </div>

            <div class="flex-row">
                <button class="btn" onclick="setupPractice('zh-to-en')">中翻英</button>
                <button class="btn" onclick="setupPractice('en-to-zh')">英翻中</button>
            </div>
            <div class="flex-row">
                <button class="btn btn-outline" onclick="setupMultipleChoice('en-to-zh')">⭕ 選擇題 (英選中)</button>
                <button class="btn btn-outline" onclick="setupMultipleChoice('zh-to-en')">⭕ 選擇題 (中選英)</button>
            </div>
            <div class="flex-row" style="margin-top: 10px;">
                <button class="btn btn-outline" onclick="setupPuzzleMode()">🧩 拼圖</button>
                <button class="btn btn-outline" onclick="setupMemoryMode()">🎴 翻卡</button>
            </div>
            <div class="flex-row" style="margin-top: 10px;">
                <button class="btn btn-outline btn-yg" onclick="setupYouglishMode()">📺 YouGlish 沉浸</button>
                <button class="btn btn-outline" style="border-color:#4caf50; color:#4caf50;" onclick="setupSpeakingMode()">🗣️ 口說挑戰</button>
            </div>
        </div>

        <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h2>網站設定</h2>
            <div class="card checkbox-wrapper" onclick="togglePronunciation()">
                <input type="checkbox" id="auto-pronounce-toggle" style="pointer-events: none;">
                <label for="auto-pronounce-toggle" style="flex:1;">自動朗讀英文單字 (建議開啟)</label>
            </div>
        </div>
    </div>

    <div id="view-book-select" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="goHome()">← 返回首頁</button>
            <h2>單字簿庫</h2>
            <div style="width: 60px;"></div>
        </div>
        
        <div id="book-list"></div>
        
        <div style="margin-top:40px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h3 style="margin-top: 0;">新增單字簿</h3>
            <div class="flex-row">
                <input type="text" id="new-book-name" placeholder="單字簿名稱..." style="flex: 2;">
                <input type="text" id="new-book-tag" placeholder="標籤 (選填)" style="flex: 1;">
            </div>
            <div style="display: flex; justify-content: flex-end;"><span class="import-trigger" onclick="toggleImportArea()">▼ 批量匯入 (Import)</span></div>
            <div id="import-area" class="hidden import-section">
                <p style="font-size:0.8rem; color:var(--text-sub); margin:0 0 10px 0;">格式: <span style="color:var(--accent)">英文 - 中文</span> (換行新增)</p>
                <textarea id="import-content" placeholder="範例：&#10;theory - 學說；理論&#10;psychology - 心理學"></textarea>
                <button class="btn btn-outline" onclick="addBookWithImport()">建立並匯入</button>
            </div>
            <button id="btn-create-simple" class="btn btn-outline" onclick="addBookSimple()">＋ 建立空單字簿</button>
        </div>
    </div>

    <div id="view-edit" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="switchView('book-select')">← 返回</button>
            <h2 id="edit-book-title">編輯單字簿</h2>
            <button class="btn-icon btn-delete" onclick="deleteCurrentBook()">刪除此簿</button>
        </div>
        
        <div class="card" style="border-color: #444;">
            <div style="font-size: 0.85rem; color: var(--text-sub); margin-bottom: 10px;">修改基本資訊</div>
            <div class="flex-row">
                <input type="text" id="edit-book-name-input" placeholder="單字簿名稱" style="flex:2;">
                <input type="text" id="edit-book-tag-input" placeholder="標籤 (選填)" style="flex:1;">
            </div>
            <button class="btn btn-outline" onclick="saveBookInfo()" style="margin-top:0;">儲存變更</button>
        </div>

        <div style="margin-top: 30px; margin-bottom: 10px; border-bottom: 1px solid var(--border); padding-bottom: 5px;">新增單字</div>
        <div class="card">
            <input type="text" id="input-en" placeholder="English Word (e.g., Apple)">
            <input type="text" id="input-zh" placeholder="中文意思 (多個意思請用逗號分隔)">
            <button class="btn btn-small" onclick="addWord()">加入單字</button>
        </div>
        <div id="word-list"></div>
    </div>

    <div id="view-practice" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon btn-quit" onclick="quitPractice()">✕ 結束</button>
            <div class="nav-bar-right">
                <span id="mode-display" style="color:var(--text-sub)"></span>
                <span id="sequential-badge" class="mode-badge hidden">循序漸進</span>
                <button class="export-quiz-btn" onclick="shareCurrentQuiz()">🔗 分享</button>
            </div>
        </div>
        <div class="practice-area">
            <div id="interaction-area">
                <div class="hint-text" id="hint-display"></div>
                <div class="question-text" id="question-display"></div>
                <input type="text" id="answer-input" placeholder="輸入答案 (直接 Enter 可看解答)..." autocomplete="off">
                <div class="flex-row">
                    <button class="btn btn-outline" id="hint-btn" onclick="showHint()">提示</button>
                    <button class="btn" onclick="checkAnswer()">送出</button>
                </div>
            </div>
            <div id="feedback-area" class="hidden">
                <div class="question-text" id="feedback-question-copy" style="font-size: 1.5rem; margin-bottom: 10px; color: var(--text-sub);"></div>
                <div id="feedback-icon" class="big-icon"></div>
                <div id="feedback-status" class="result-status"></div>
                <div class="answer-reveal">
                    正確答案: <span id="feedback-answer" style="color: var(--accent); margin-left: 5px;"></span>
                    <button class="tts-btn-large" onclick="replayAudio()">🔊</button>
                </div>
                <button class="btn btn-next-big" onclick="handleNextClick()">下一個</button>
            </div>
            <div class="progress-text" id="progress-display"></div>
        </div>
    </div>

    <div id="view-mcq" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon btn-quit" onclick="quitPractice()">✕ 結束</button>
            <div class="nav-bar-right">
                <span id="mcq-mode-display" style="color:var(--text-sub)">選擇題</span>
                <span id="mcq-seq-badge" class="mode-badge hidden">循序漸進</span>
                <button class="export-quiz-btn" onclick="shareCurrentQuiz()">🔗 分享</button>
            </div>
        </div>
        <div class="practice-area">
            <div id="mcq-interaction-area">
                <div class="question-text" id="mcq-question-display"></div>
                <div class="mcq-grid" id="mcq-options-area"></div>
            </div>
            <div id="mcq-feedback-area" class="hidden">
                <div class="question-text" id="mcq-feedback-question-copy" style="font-size: 1.5rem; margin-bottom: 10px; color: var(--text-sub);"></div>
                <div id="mcq-feedback-icon" class="big-icon"></div>
                <div id="mcq-feedback-status" class="result-status"></div>
                <div class="answer-reveal">
                    正確答案: <span id="mcq-feedback-answer" style="color: var(--accent); margin-left: 5px;"></span>
                    <button class="tts-btn-large" onclick="replayAudio()">🔊</button>
                </div>
                <button class="btn btn-next-big" onclick="handleMcqNextClick()">下一個</button>
            </div>
            <div class="progress-text" id="mcq-progress-display"></div>
        </div>
    </div>

    <div id="view-speaking" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon btn-quit" onclick="quitPractice()">✕ 結束</button>
            <div class="nav-bar-right">
                <span style="color:#4caf50; margin-right:5px;">口說挑戰</span>
                <button class="export-quiz-btn" onclick="shareCurrentQuiz()">🔗 分享</button>
            </div>
        </div>
        <div class="practice-area">
            <div id="speaking-interaction-area">
                <div class="question-text" id="speaking-word-display" style="font-size:2.5rem;">Word</div>
                <div class="yg-zh-display" id="speaking-zh-display">中文意思</div>
                <button class="mic-btn" id="mic-btn" onclick="startSpeechRecognition()">🎤</button>
                <div class="speaking-status" id="speaking-status">點擊麥克風，念出上方的單字</div>
            </div>

            <div id="speaking-feedback-area" class="hidden">
                <div id="speaking-score" class="score-circle">--</div>
                <div id="speaking-feedback-msg" class="result-status"></div>
                <div class="answer-reveal" id="speaking-heard-text" style="color:var(--text-sub); font-size:1rem;"></div>
                <button class="btn btn-next-big" onclick="handleSpeakingNextClick()">下一個</button>
            </div>
            <div class="progress-text" id="speaking-progress"></div>
        </div>
    </div>

    <div id="view-puzzle" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon btn-quit" onclick="quitPractice()">✕ 結束</button>
            <div class="nav-bar-right">
                <span style="color:var(--text-sub)">拼圖</span>
                <span id="puzzle-seq-badge" class="mode-badge hidden">循序漸進</span>
                <button class="export-quiz-btn" onclick="shareCurrentQuiz()">🔗 分享</button>
            </div>
        </div>
        <div class="practice-area">
            <div class="question-text" id="puzzle-question"></div>
            <div id="puzzle-answer-area" class="puzzle-container"></div>
            <div style="margin: 20px 0; border-bottom: 1px solid var(--border);"></div>
            <div id="puzzle-pool-area" class="puzzle-container"></div>
            <div class="result-msg" id="puzzle-message" style="margin-top:10px; height: 30px;"></div>
            <div class="progress-text" id="puzzle-progress"></div>
        </div>
    </div>

    <div id="view-memory" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon btn-quit" onclick="quitPractice()">✕ 結束</button>
            <div class="nav-bar-right">
                <span style="color:var(--text-sub); margin-right:5px;">翻卡</span>
                <button class="export-quiz-btn" onclick="shareCurrentQuiz()">🔗 分享</button>
            </div>
        </div>
        <div style="text-align:center; color:var(--text-sub); margin-bottom:10px;">找出配對的卡片</div>
        <div id="memory-board" class="memory-grid"></div>
        <div class="result-msg" id="memory-message" style="text-align:center; margin-top:10px;"></div>
    </div>

    <div id="view-youglish" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon btn-quit" onclick="quitPractice()">← 結束</button>
            <div class="nav-bar-right">
                <span style="color:var(--text-sub); margin-right:5px;">YouGlish</span>
                <button class="export-quiz-btn" onclick="shareCurrentQuiz()">🔗 分享</button>
            </div>
        </div>
        <div class="practice-area" style="margin-top: 10px;">
            <div class="yg-word-display" id="yg-word">word</div>
            <div class="yg-zh-display" id="yg-zh">中文意思</div>

            <p class="yg-tip">點擊下方按鈕，在瀏覽器中開啟 YouGlish，<br>聽母語者在真實情境中使用這個單字。</p>

            <a id="yg-link" href="#" target="_blank" class="yg-open-btn">
                📺 在 YouGlish 上聆聽「<span id="yg-link-word"></span>」
                <div class="yg-btn-label">開啟新分頁 → youglish.com</div>
            </a>
            
            <div class="flex-row" style="margin-top: 20px;">
                <button class="btn btn-outline" onclick="prevYouglishCard()">上一個</button>
                <button class="btn" onclick="nextYouglishCard()">下一個單字</button>
            </div>
            <div class="progress-text" id="yg-progress"></div>
        </div>
    </div>

</div>

<script>
    // --- Data Management ---
    let books = JSON.parse(localStorage.getItem('sv_books')) || [];
    let autoPronounce = JSON.parse(localStorage.getItem('sv_autoPronounce')) ?? true; 
    let isSequentialMode = false;
    
    let currentBookId = null, practiceQueue = [], currentCardIndex = 0;
    let initialQueueLength = 0, completedCount = 0;
    let currentMode = '', selectedBookIds = new Set(), lastAnswerCorrect = false;
    
    let puzzleCurrentWord = null, puzzleUserAnswer = [], puzzleSourceLetters = [];
    let memoryCards = [], memoryFlipped = [], memoryLocked = false, memoryMatchedCount = 0;

    // --- Guest / Share Mode Variables ---
    let isGuestMode = false;
    let guestWords = [];

    // --- Web Speech API 初始化 ---
    let recognition = null;
    try {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
        }
    } catch(e) { console.error("語音 API 初始化失敗", e); }

    function saveData() { localStorage.setItem('sv_books', JSON.stringify(books)); }

    // --- Navigation ---
    const views = ['home', 'book-select', 'edit', 'practice', 'mcq', 'speaking', 'puzzle', 'memory', 'youglish'];
    
    function switchView(viewName) {
        views.forEach(v => {
            const el = document.getElementById(`view-${v}`);
            if(el) {
                if(v === viewName) { el.classList.remove('hidden'); el.style.setProperty('display', 'block', 'important'); } 
                else { el.classList.add('hidden'); el.style.setProperty('display', 'none', 'important'); }
            }
        });
    }
    
    function setDisplayState(id, isDisplay, displayType = 'block') {
        const el = document.getElementById(id);
        if (el) {
            if (isDisplay) { el.classList.remove('hidden'); el.style.setProperty('display', displayType, 'important'); } 
            else { el.classList.add('hidden'); el.style.setProperty('display', 'none', 'important'); }
        }
    }
    
    function goHome() { 
        updateHomeSummary(); renderSettings(); switchView('home'); 
    }
    
    function openBookSelect() { renderBookList(); switchView('book-select'); }
    
    function quitPractice() { 
        if ('speechSynthesis' in window) window.speechSynthesis.cancel(); 
        if (isGuestMode) {
            isGuestMode = false;
            document.querySelectorAll('.btn-quit').forEach(btn => btn.innerText = '✕ 結束');
            document.querySelectorAll('.export-quiz-btn').forEach(btn => btn.style.setProperty('display', 'inline-block', 'important'));
            // 退出訪客模式時，清空網址列，避免重新整理又回到測驗
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        goHome(); 
    }

    function renderSettings() {
        const pToggle = document.getElementById('auto-pronounce-toggle'); if (pToggle) pToggle.checked = autoPronounce;
        const sToggle = document.getElementById('sequential-toggle'); if (sToggle) sToggle.checked = isSequentialMode;
    }
    function togglePronunciation() { autoPronounce = !autoPronounce; localStorage.setItem('sv_autoPronounce', autoPronounce); renderSettings(); }
    function toggleSequential() { isSequentialMode = !isSequentialMode; renderSettings(); }
    
    function speakEnglishWord(word) {
        if (!autoPronounce && !window.forceSpeak) return; 
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US'; utterance.rate = 0.95; 
            window.speechSynthesis.speak(utterance);
        }
        window.forceSpeak = false;
    }
    function replayAudio() { 
        window.forceSpeak = true; 
        if(practiceQueue[currentCardIndex]) { speakEnglishWord(practiceQueue[currentCardIndex].en); }
    }

    // --- 隨機插隊函數 (Random Re-queue) ---
    function requeueWord(word) {
        let remaining = practiceQueue.length - 1 - currentCardIndex;
        if (remaining <= 0) {
            practiceQueue.push(word);
        } else {
            let minIndex = currentCardIndex + 1;
            if (remaining > 1) minIndex = currentCardIndex + 2; 
            let maxIndex = practiceQueue.length;
            let randomIndex = Math.floor(Math.random() * (maxIndex - minIndex + 1)) + minIndex;
            practiceQueue.splice(randomIndex, 0, word);
        }
    }

    // --- 測驗結束共用邏輯 (支援訪客儲存) ---
    function endQuiz() {
        if (isGuestMode) {
            if (confirm("測驗結束！🎉\n\n你要將這份「朋友分享的單字庫」儲存到你的 SilenVocab 嗎？")) {
                const newName = prompt("請為這份單字簿取個名字：", "分享的單字包");
                if(newName) {
                    books.push({ id: Date.now(), name: newName, tag: "來自分享", words: guestWords });
                    saveData();
                    alert("✅ 儲存成功！已加入你的單字庫中。");
                }
            }
        } else {
            alert("測驗結束！做得好！");
        }
        quitPractice();
    }

    // --- 分享測驗邏輯 (LZ-String 壓縮算法) ---
    function shareCurrentQuiz() {
        if (typeof LZString === 'undefined') {
            alert("系統正在載入壓縮模組，請稍等幾秒後再試一次！");
            return;
        }

        let wordsToShare = practiceQueue;
        // 防呆：如果還是太多，最多限制50題，保證 IG 絕對過關
        if(practiceQueue.length > 50) {
            alert("提醒：為了確保網址能正常在 Instagram / LINE 分享，系統將只截取前 50 個單字作為測驗包！");
            wordsToShare = practiceQueue.slice(0, 50);
        }
        
        let view = 'practice';
        if (!document.getElementById('view-mcq').classList.contains('hidden')) view = 'mcq';
        else if (!document.getElementById('view-speaking').classList.contains('hidden')) view = 'speaking';
        else if (!document.getElementById('view-puzzle').classList.contains('hidden')) view = 'puzzle';
        else if (!document.getElementById('view-memory').classList.contains('hidden')) view = 'memory';
        else if (!document.getElementById('view-youglish').classList.contains('hidden')) view = 'youglish';

        // 1. 極簡化資料結構
        const minifiedWords = wordsToShare.map(w => [w.en, ...w.zh]);
        const shareData = [view, currentMode, isSequentialMode ? 1 : 0, minifiedWords];

        try {
            const jsonStr = JSON.stringify(shareData);
            
            // 2. 呼叫 LZString 強力壓縮，並轉成適合 URL 的字串
            const compressedUrlSafe = LZString.compressToEncodedURIComponent(jsonStr);
            
            const shareUrl = window.location.origin + window.location.pathname + '?lz=' + compressedUrlSafe;
            
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(shareUrl).then(() => {
                    alert("✅ 測驗連結已複製到剪貼簿！網址已高度壓縮，發 IG 限動絕對沒問題！");
                }).catch(err => {
                    prompt("請手動複製以下連結分享給朋友：", shareUrl);
                });
            } else {
                prompt("請手動複製以下連結分享給朋友：", shareUrl);
            }
        } catch(e) {
            console.error(e);
            alert("產生分享連結失敗");
        }
    }

    // --- 載入時檢查是否為訪客模式 ---
    function checkShareUrl() {
        const urlParams = new URLSearchParams(window.location.search);
        
        // 優先檢查新的 LZ 壓縮網址
        const lzCode = urlParams.get('lz');
        if (lzCode) {
            try {
                if (typeof LZString === 'undefined') {
                    // 如果 LZString 還沒載入好，延遲 100ms 再試一次
                    setTimeout(checkShareUrl, 100);
                    return true; 
                }
                
                const jsonStr = LZString.decompressFromEncodedURIComponent(lzCode);
                if (!jsonStr) throw new Error("解壓縮失敗");
                
                const decoded = JSON.parse(jsonStr);
                const finalData = {
                    v: decoded[0],
                    m: decoded[1],
                    s: decoded[2] === 1,
                    w: decoded[3].map(arr => ({ en: arr[0], zh: arr.slice(1) }))
                };
                startGuestMode(finalData);
                return true;
            } catch(e) {
                console.error(e);
                alert("❌ 無效或過期的分享連結！");
                return false;
            }
        }
        
        // 為了相容，保留舊版未壓縮的解析邏輯
        let shareCode = urlParams.get('s') || urlParams.get('share');
        if (shareCode) {
            try {
                shareCode = shareCode.replace(/ /g, '+').replace(/-/g, '+').replace(/_/g, '/');
                while (shareCode.length % 4) shareCode += '=';
                
                const jsonStr = decodeURIComponent(escape(atob(shareCode)));
                const decoded = JSON.parse(jsonStr);
                
                let finalData;
                if (Array.isArray(decoded)) {
                    finalData = { v: decoded[0], m: decoded[1], s: decoded[2] === 1, w: decoded[3].map(arr => ({ en: arr[0], zh: arr.slice(1) })) };
                } else {
                    finalData = decoded;
                }
                startGuestMode(finalData);
                return true;
            } catch(e) {
                console.error(e);
                alert("❌ 無效或過期的舊版分享連結！");
                return false;
            }
        }
        return false;
    }

    function startGuestMode(data) {
        isGuestMode = true;
        guestWords = data.w;
        practiceQueue = [...data.w];
        currentMode = data.m;
        isSequentialMode = data.s;
        
        initialQueueLength = practiceQueue.length;
        completedCount = 0;
        currentCardIndex = 0;

        // UI 調整：隱藏分享按鈕，修改退出文字
        document.querySelectorAll('.export-quiz-btn').forEach(btn => btn.style.setProperty('display', 'none', 'important'));
        document.querySelectorAll('.btn-quit').forEach(btn => btn.innerText = '🏠 離開');

        if (data.v === 'mcq') {
            document.getElementById('mcq-mode-display').innerText = (currentMode === 'zh-to-en' ? '中選英' : '英選中') + ' (訪客對戰)';
            setDisplayState('mcq-seq-badge', isSequentialMode, 'inline-block');
            switchView('mcq'); showMcqNextCard();
        } else if (data.v === 'speaking') {
            switchView('speaking'); showNextSpeakingCard();
        } else if (data.v === 'puzzle') {
            setDisplayState('puzzle-seq-badge', isSequentialMode, 'inline-block');
            switchView('puzzle'); loadPuzzleLevel();
        } else if (data.v === 'memory') {
            setupMemoryModeGuest();
        } else if (data.v === 'youglish') {
            switchView('youglish'); loadYouglishCard();
        } else {
            document.getElementById('mode-display').innerText = (currentMode === 'zh-to-en' ? '中翻英' : '英翻中') + ' (訪客對戰)';
            setDisplayState('sequential-badge', isSequentialMode, 'inline-block');
            setDisplayState('hint-btn', currentMode === 'zh-to-en', 'inline-block');
            switchView('practice'); showNextCard();
        }
    }

    // --- Book Management ---
    function updateHomeSummary() {
        const summaryEl = document.getElementById('home-book-summary');
        if(!summaryEl) return;
        let selectedCount = 0, wordCount = 0;
        books.forEach(b => {
            if(selectedBookIds.has(b.id)) { selectedCount++; wordCount += b.words.length; }
        });
        if(selectedCount === 0) summaryEl.innerHTML = '<span style="color:var(--text-sub);">尚未選擇單字簿，請先進入管理區選擇喔！</span>';
        else summaryEl.innerHTML = `已準備好 <span style="color:var(--accent); font-weight:bold; font-size:1.3rem;">${selectedCount}</span> 本單字簿，共 <span style="color:var(--accent); font-weight:bold; font-size:1.3rem;">${wordCount}</span> 字`;
    }

    function renderBookList() {
        const list = document.getElementById('book-list'); list.innerHTML = '';
        if(books.length === 0) { 
            list.innerHTML = '<div style="color:var(--text-sub); text-align:center; padding: 20px;">目前沒有單字簿，請在下方新增</div>'; 
            updateHomeSummary(); return; 
        }

        const groups = {};
        books.forEach(book => {
            const t = (book.tag && book.tag.trim() !== '') ? book.tag.trim() : '未分類';
            if(!groups[t]) groups[t] = [];
            groups[t].push(book);
        });

        const keys = Object.keys(groups).sort((a, b) => {
            if(a === '未分類') return 1; if(b === '未分類') return -1; return a.localeCompare(b);
        });

        keys.forEach(k => {
            const header = document.createElement('div'); header.className = 'group-title'; header.innerText = `🏷️ ${k}`; list.appendChild(header);
            groups[k].forEach(book => {
                const div = document.createElement('div'); div.className = `card book-item ${selectedBookIds.has(book.id) ? 'selected' : ''}`;
                const wrapper = document.createElement('div'); wrapper.className = 'checkbox-wrapper'; wrapper.style.flex = '1';
                const checkbox = document.createElement('input'); checkbox.type = 'checkbox'; checkbox.checked = selectedBookIds.has(book.id); checkbox.style.pointerEvents = 'none';
                const info = document.createElement('div'); info.style.flex = '1'; info.style.marginLeft = '15px';
                info.innerHTML = `<strong>${book.name}</strong> <span style="font-size:0.8rem; color:var(--text-sub)">(${book.words.length} 字)</span>`;
                wrapper.appendChild(checkbox); wrapper.appendChild(info);
                const editBtn = document.createElement('button'); editBtn.className = 'btn-icon'; editBtn.innerHTML = '✎'; 
                editBtn.onclick = (e) => { e.stopPropagation(); openEditBook(book.id); };
                div.appendChild(wrapper); div.appendChild(editBtn);
                div.onclick = (e) => { 
                    if(selectedBookIds.has(book.id)) selectedBookIds.delete(book.id); else selectedBookIds.add(book.id); renderBookList(); 
                };
                list.appendChild(div);
            });
        });
        updateHomeSummary(); 
    }

    function toggleImportArea() {
        const area = document.getElementById('import-area');
        if (area.classList.contains('hidden')) { setDisplayState('import-area', true); setDisplayState('btn-create-simple', false); } 
        else { setDisplayState('import-area', false); setDisplayState('btn-create-simple', true); }
    }

    function addBookSimple() {
        const name = document.getElementById('new-book-name').value.trim(), tag = document.getElementById('new-book-tag').value.trim();
        if (!name) return alert("請輸入單字簿名稱");
        books.push({ id: Date.now(), name: name, tag: tag, words: [] }); saveData(); 
        document.getElementById('new-book-name').value = ''; document.getElementById('new-book-tag').value = ''; renderBookList();
    }

    function addBookWithImport() {
        const name = document.getElementById('new-book-name').value.trim(), tag = document.getElementById('new-book-tag').value.trim(), rawText = document.getElementById('import-content').value.trim();
        if (!name) return alert("請輸入單字簿名稱"); if (!rawText) return alert("請貼上單字列表");
        const lines = rawText.split('\n'), newWords = [];
        lines.forEach(line => {
            let separatorIndex = line.indexOf('-'); if(separatorIndex === -1) separatorIndex = line.indexOf('–'); 
            if (separatorIndex > 0) {
                const en = line.substring(0, separatorIndex).trim(), zhStr = line.substring(separatorIndex + 1).trim();
                if (en && zhStr) {
                    const zh = zhStr.split(/[;；,，\/]/).map(s => s.trim()).filter(s => s);
                    newWords.push({ en: en, zh: zh });
                }
            }
        });
        if (newWords.length === 0) return alert("無法識別任何單字，請檢查格式是否為「英文 - 中文」");
        books.push({ id: Date.now(), name: name, tag: tag, words: newWords }); saveData();
        document.getElementById('new-book-name').value = ''; document.getElementById('new-book-tag').value = ''; document.getElementById('import-content').value = ''; 
        toggleImportArea(); renderBookList(); alert(`成功建立單字簿「${name}」，並匯入 ${newWords.length} 個單字！`);
    }

    function deleteCurrentBook() {
        if(confirm('確定要刪除整個單字簿嗎？')) { books = books.filter(b => b.id !== currentBookId); selectedBookIds.delete(currentBookId); saveData(); openBookSelect(); }
    }

    function openEditBook(id) { 
        currentBookId = id; const book = books.find(b => b.id === id);
        document.getElementById('edit-book-name-input').value = book.name; document.getElementById('edit-book-tag-input').value = book.tag || '';
        renderWordList(); switchView('edit'); 
    }

    function saveBookInfo() {
        const book = books.find(b => b.id === currentBookId); if(!book) return;
        const newName = document.getElementById('edit-book-name-input').value.trim(), newTag = document.getElementById('edit-book-tag-input').value.trim();
        if(!newName) return alert('單字簿名稱不能為空！');
        book.name = newName; book.tag = newTag; saveData(); alert('已儲存基本資訊變更！');
    }

    function renderWordList() {
        const book = books.find(b => b.id === currentBookId); const list = document.getElementById('word-list'); list.innerHTML = '';
        [...book.words].reverse().forEach((word, index) => {
            const div = document.createElement('div'); div.className = 'word-item';
            div.innerHTML = `<div><div class="word-en">${word.en}</div><div class="word-zh">${word.zh.join(', ')}</div></div><button class="btn-icon btn-delete" onclick="deleteWord(${book.words.length - 1 - index})">✕</button>`;
            list.appendChild(div);
        });
    }

    function addWord() {
        const en = document.getElementById('input-en').value.trim(), zhStr = document.getElementById('input-zh').value.trim();
        if(!en || !zhStr) return alert("請輸入完整");
        const zhArray = zhStr.split(/[;；,，\/]/).map(s => s.trim()).filter(s => s);
        books.find(b => b.id === currentBookId).words.push({ en: en, zh: zhArray }); saveData();
        document.getElementById('input-en').value = ''; document.getElementById('input-zh').value = ''; document.getElementById('input-en').focus(); renderWordList();
    }

    function deleteWord(index) { books.find(b => b.id === currentBookId).words.splice(index, 1); saveData(); renderWordList(); }
    
    function getPracticeWords() {
        if (selectedBookIds.size === 0) { alert("請先進入「選擇與管理單字簿」勾選你要練習的範圍喔！"); return []; }
        let queue = []; books.forEach(book => { if (selectedBookIds.has(book.id)) queue.push(...book.words); });
        if (queue.length === 0) { alert("選定的單字簿裡面沒有任何單字！"); return []; } 
        return queue;
    }

    // ⭐ 精準抓取干擾項：只從已選取（或訪客分享）的單字池抓取
    function getSelectedWordsPool() {
        if (isGuestMode) return guestWords;
        let pool = []; 
        books.forEach(book => { 
            if (selectedBookIds.has(book.id)) pool.push(...book.words); 
        }); 
        return pool;
    }

    // =====================================
    // 1. Standard Practice Mode
    // =====================================
    function setupPractice(mode) {
        practiceQueue = getPracticeWords(); if(practiceQueue.length === 0) return;
        if (!isSequentialMode) practiceQueue.sort(() => Math.random() - 0.5);
        currentMode = mode; currentCardIndex = 0; initialQueueLength = practiceQueue.length; completedCount = 0;
        document.getElementById('mode-display').innerText = mode === 'zh-to-en' ? '中翻英' : '英翻中';
        
        setDisplayState('sequential-badge', isSequentialMode, 'inline-block');
        setDisplayState('hint-btn', mode === 'zh-to-en', 'inline-block');
        
        switchView('practice'); showNextCard();
    }
    function showNextCard() {
        if (currentCardIndex >= practiceQueue.length) { endQuiz(); return; }
        const word = practiceQueue[currentCardIndex];
        
        setDisplayState('interaction-area', true, 'block');
        setDisplayState('feedback-area', false);
        
        document.getElementById('answer-input').value = ''; document.getElementById('hint-display').innerText = '';
        document.getElementById('progress-display').innerText = isSequentialMode ? `循序漸進: 第 ${currentCardIndex + 1} 關` : `完成進度: ${completedCount} / ${initialQueueLength}`;
        document.getElementById('answer-input').focus();
        
        const questionText = currentMode === 'zh-to-en' ? word.zh.join(' / ') : word.en;
        document.getElementById('question-display').innerText = questionText; 
        document.getElementById('feedback-question-copy').innerText = questionText; 
    }
    function showHint() {
        const word = practiceQueue[currentCardIndex].en; if(word.length <= 2) { document.getElementById('hint-display').innerText = word; return; }
        document.getElementById('hint-display').innerText = `${word.charAt(0)}${'_'.repeat(word.length - 2)}${word.charAt(word.length - 1)}`;
    }
    function checkAnswer() {
        const input = document.getElementById('answer-input'); const val = input.value.trim(); const currentWord = practiceQueue[currentCardIndex];
        let isCorrect = false;
        if (val !== '') {
            if (currentMode === 'zh-to-en') { if (val.toLowerCase() === currentWord.en.toLowerCase()) isCorrect = true; } 
            else { if (currentWord.zh.some(m => m.trim().includes(val) && val.length > 0)) isCorrect = true; }
        }
        lastAnswerCorrect = isCorrect;
        
        if (!isCorrect && !isSequentialMode) requeueWord(currentWord);
        
        showFeedback(isCorrect, currentWord);
    }
    function showFeedback(isCorrect, word) {
        setDisplayState('interaction-area', false);
        setDisplayState('feedback-area', true, 'flex');
        
        const icon = document.getElementById('feedback-icon'), status = document.getElementById('feedback-status');
        document.getElementById('feedback-answer').innerText = currentMode === 'zh-to-en' ? word.en : word.zh.join(', ');
        
        if (isCorrect) { 
            icon.innerText = '✔'; icon.className = 'big-icon icon-correct'; status.innerText = '正確!'; status.className = 'result-status status-correct'; 
        } else { 
            icon.innerText = '✘'; icon.className = 'big-icon icon-wrong'; status.innerText = '錯誤!'; status.className = 'result-status status-wrong'; 
        }
        speakEnglishWord(word.en); 
    }
    function handleNextClick() {
        if (lastAnswerCorrect) completedCount++;
        if (isSequentialMode && !lastAnswerCorrect) { alert("循序漸進模式：錯誤！回到第一題重來！"); currentCardIndex = 0; completedCount = 0; showNextCard(); return; }
        currentCardIndex++; showNextCard();
    }
    document.getElementById('answer-input').addEventListener('keypress', (e) => { if(e.key === 'Enter'){ e.preventDefault(); checkAnswer(); }});

    // =====================================
    // 2. Multiple Choice Mode
    // =====================================
    function setupMultipleChoice(mode) {
        practiceQueue = getPracticeWords(); if(practiceQueue.length === 0) return;
        
        const pool = getSelectedWordsPool();
        const uniqueEn = new Set(pool.map(w => w.en));
        if(uniqueEn.size < 4) return alert("選擇題模式需要您勾選的單字簿中「至少有 4 個不重複的單字」才能產生選項喔！");

        if (!isSequentialMode) practiceQueue.sort(() => Math.random() - 0.5);
        currentMode = mode; currentCardIndex = 0; initialQueueLength = practiceQueue.length; completedCount = 0;
        
        document.getElementById('mcq-mode-display').innerText = mode === 'zh-to-en' ? '中選英' : '英選中';
        setDisplayState('mcq-seq-badge', isSequentialMode, 'inline-block');
        
        switchView('mcq'); showMcqNextCard();
    }
    function showMcqNextCard() {
        if (currentCardIndex >= practiceQueue.length) { endQuiz(); return; }
        const currentWord = practiceQueue[currentCardIndex];
        
        setDisplayState('mcq-interaction-area', true, 'block');
        setDisplayState('mcq-feedback-area', false);
        
        document.getElementById('mcq-progress-display').innerText = isSequentialMode ? `循序漸進: 第 ${currentCardIndex + 1} 關` : `完成進度: ${completedCount} / ${initialQueueLength}`;
        const questionText = currentMode === 'zh-to-en' ? currentWord.zh.join(' / ') : currentWord.en;
        document.getElementById('mcq-question-display').innerText = questionText;
        document.getElementById('mcq-feedback-question-copy').innerText = questionText;

        const pool = getSelectedWordsPool();
        let options = [currentWord];
        let availableDistractors = [];
        let seen = new Set([currentWord.en]); 
        
        pool.forEach(w => {
            if (!seen.has(w.en)) {
                seen.add(w.en);
                availableDistractors.push(w);
            }
        });
        
        availableDistractors.sort(() => Math.random() - 0.5);
        options.push(...availableDistractors.slice(0, 3));
        options.sort(() => Math.random() - 0.5);
        
        const optionsArea = document.getElementById('mcq-options-area');
        optionsArea.innerHTML = '';
        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'btn-mcq';
            btn.innerText = currentMode === 'zh-to-en' ? opt.en : opt.zh.join(' / ');
            btn.onclick = () => checkMcqAnswer(opt.en === currentWord.en);
            optionsArea.appendChild(btn);
        });
    }
    function checkMcqAnswer(isCorrect) {
        lastAnswerCorrect = isCorrect;
        const currentWord = practiceQueue[currentCardIndex];
        if (!isCorrect && !isSequentialMode) requeueWord(currentWord);
        
        setDisplayState('mcq-interaction-area', false);
        setDisplayState('mcq-feedback-area', true, 'flex');
        
        const icon = document.getElementById('mcq-feedback-icon'), status = document.getElementById('mcq-feedback-status');
        document.getElementById('mcq-feedback-answer').innerText = currentMode === 'zh-to-en' ? currentWord.en : currentWord.zh.join(', ');
        
        if (isCorrect) { 
            icon.innerText = '✔'; icon.className = 'big-icon icon-correct'; status.innerText = '正確!'; status.className = 'result-status status-correct'; 
        } else { 
            icon.innerText = '✘'; icon.className = 'big-icon icon-wrong'; status.innerText = '錯誤!'; status.className = 'result-status status-wrong'; 
        }
        speakEnglishWord(currentWord.en); 
    }
    function handleMcqNextClick() {
        if (lastAnswerCorrect) completedCount++;
        if (isSequentialMode && !lastAnswerCorrect) { alert("循序漸進模式：錯誤！回到第一題重來！"); currentCardIndex = 0; completedCount = 0; showMcqNextCard(); return; }
        currentCardIndex++; showMcqNextCard();
    }

    // =====================================
    // 3. Speaking Challenge Mode 🗣️
    // =====================================
    function setupSpeakingMode() {
        if (!recognition) return alert("您的瀏覽器目前不支援用語音辨識功能，建議使用最新版 Chrome 或同意麥克風存取權限。");
        practiceQueue = getPracticeWords(); if(practiceQueue.length === 0) return;
        if (!isSequentialMode) practiceQueue.sort(() => Math.random() - 0.5);
        
        currentCardIndex = 0; initialQueueLength = practiceQueue.length; completedCount = 0;
        switchView('speaking'); showNextSpeakingCard();
    }
    function showNextSpeakingCard() {
        if(currentCardIndex >= practiceQueue.length) { endQuiz(); return; }
        const word = practiceQueue[currentCardIndex];
        
        setDisplayState('speaking-interaction-area', true, 'block');
        setDisplayState('speaking-feedback-area', false);
        
        document.getElementById('speaking-word-display').innerText = word.en;
        document.getElementById('speaking-zh-display').innerText = word.zh.join(' / ');
        document.getElementById('speaking-status').innerText = '點擊麥克風，對著設備念出單字';
        document.getElementById('speaking-progress').innerText = `進度: ${completedCount}/${initialQueueLength}`;
        speakEnglishWord(word.en);
    }
    function startSpeechRecognition() {
        const btn = document.getElementById('mic-btn'), status = document.getElementById('speaking-status');
        try { recognition.start(); btn.classList.add('listening'); status.innerText = '正在聆聽中... (請說話)'; } catch(e) { }
        recognition.onresult = function(event) {
            const heardWord = event.results[0][0].transcript.toLowerCase().replace(/[.,?!]/g, "").trim();
            const confidence = event.results[0][0].confidence;
            const targetWord = practiceQueue[currentCardIndex].en.toLowerCase().trim();
            btn.classList.remove('listening'); processSpeakingResult(heardWord, targetWord, confidence);
        };
        recognition.onerror = function(event) { btn.classList.remove('listening'); status.innerText = '辨識失敗，請再按一次重試'; };
        recognition.onspeechend = function() { recognition.stop(); btn.classList.remove('listening'); };
    }
    function processSpeakingResult(heard, target, confidence) {
        setDisplayState('speaking-interaction-area', false);
        setDisplayState('speaking-feedback-area', true, 'flex');
        const scoreDisplay = document.getElementById('speaking-score'), msgDisplay = document.getElementById('speaking-feedback-msg'), heardDisplay = document.getElementById('speaking-heard-text');
        
        if (heard === target || heard.includes(target) || target.includes(heard)) {
            lastAnswerCorrect = true;
            let finalScore = Math.round(confidence * 100); if (finalScore < 50) finalScore = 80; 
            scoreDisplay.innerText = `${finalScore} 分`; scoreDisplay.style.color = 'var(--success)';
            msgDisplay.innerText = '發音非常標準！'; heardDisplay.innerText = `系統聽到的: "${heard}"`;
        } else {
            lastAnswerCorrect = false;
            scoreDisplay.innerText = `0 分`; scoreDisplay.style.color = 'var(--error)';
            msgDisplay.innerText = `發音有點不對喔...`; heardDisplay.innerText = `系統聽到的: "${heard}"`;
            if (!isSequentialMode) requeueWord(practiceQueue[currentCardIndex]);
        }
    }
    function handleSpeakingNextClick() {
        if(lastAnswerCorrect) completedCount++;
        if(isSequentialMode && !lastAnswerCorrect) { alert('重頭開始！'); currentCardIndex=0; completedCount=0; showNextSpeakingCard(); return; }
        currentCardIndex++; showNextSpeakingCard();
    }

    // =====================================
    // 4. Puzzle Mode
    // =====================================
    function setupPuzzleMode() {
        practiceQueue = getPracticeWords(); if(practiceQueue.length === 0) return;
        if (!isSequentialMode) practiceQueue.sort(() => Math.random() - 0.5);
        currentCardIndex = 0; setDisplayState('puzzle-seq-badge', isSequentialMode, 'inline-block');
        switchView('puzzle'); loadPuzzleLevel();
    }
    function loadPuzzleLevel() {
        if (currentCardIndex >= practiceQueue.length) { endQuiz(); return; }
        puzzleCurrentWord = practiceQueue[currentCardIndex]; puzzleUserAnswer = [];
        let letters = puzzleCurrentWord.en.toLowerCase().split('');
        for (let i = letters.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [letters[i], letters[j]] = [letters[j], letters[i]]; }
        puzzleSourceLetters = letters.map((l, i) => ({ id: i, char: l, used: false }));
        document.getElementById('puzzle-question').innerText = puzzleCurrentWord.zh.join(' / '); document.getElementById('puzzle-message').innerText = '';
        document.getElementById('puzzle-progress').innerText = isSequentialMode ? `循序漸進: 第 ${currentCardIndex + 1} 關` : `進度: ${currentCardIndex + 1} / ${practiceQueue.length}`;
        renderPuzzleBoard();
    }
    function renderPuzzleBoard() {
        const ansArea = document.getElementById('puzzle-answer-area'), poolArea = document.getElementById('puzzle-pool-area');
        ansArea.innerHTML = ''; poolArea.innerHTML = '';
        puzzleUserAnswer.forEach((letterObj, idx) => { const tile = document.createElement('div'); tile.className = 'letter-tile'; tile.innerText = letterObj.char; tile.onclick = () => { removeLetterFromAnswer(idx); }; ansArea.appendChild(tile); });
        if(puzzleUserAnswer.length < puzzleCurrentWord.en.length) { const placeholder = document.createElement('div'); placeholder.className = 'letter-tile empty'; placeholder.innerText = '_'; ansArea.appendChild(placeholder); }
        puzzleSourceLetters.forEach(letterObj => { if(!letterObj.used) { const tile = document.createElement('div'); tile.className = 'letter-tile'; tile.innerText = letterObj.char; tile.onclick = () => { addLetterToAnswer(letterObj); }; poolArea.appendChild(tile); } });
    }
    function addLetterToAnswer(letterObj) { letterObj.used = true; puzzleUserAnswer.push(letterObj); renderPuzzleBoard(); checkPuzzleState(); }
    function removeLetterFromAnswer(index) { puzzleUserAnswer[index].used = false; puzzleUserAnswer.splice(index, 1); renderPuzzleBoard(); }
    function checkPuzzleState() {
        const currentString = puzzleUserAnswer.map(o => o.char).join(''), targetString = puzzleCurrentWord.en.toLowerCase(), msg = document.getElementById('puzzle-message');
        if (puzzleUserAnswer.length === targetString.length) {
            if (currentString === targetString) { msg.className = 'result-msg result-correct'; msg.innerText = '拼字正確！'; speakEnglishWord(puzzleCurrentWord.en); setTimeout(() => { currentCardIndex++; loadPuzzleLevel(); }, 800); } 
            else {
                if(isSequentialMode) { msg.className = 'result-msg result-wrong'; msg.innerText = `錯誤！答案是 ${puzzleCurrentWord.en}。重頭開始！`; speakEnglishWord(puzzleCurrentWord.en); setTimeout(() => { currentCardIndex = 0; loadPuzzleLevel(); }, 2000); } 
                else { msg.className = 'result-msg result-wrong'; msg.innerText = '錯誤，請修正'; }
            }
        }
    }

    // =====================================
    // 5. Memory Match Mode
    // =====================================
    function setupMemoryMode() {
        let pool = getPracticeWords(); if(pool.length === 0) return; if (pool.length < 2) return alert("翻卡遊戲至少需要 2 個單字！");
        pool.sort(() => Math.random() - 0.5); const selectedWords = pool.slice(0, 8); 
        memoryCards = []; selectedWords.forEach(w => { memoryCards.push({ id: w.en, content: w.en, type: 'en', matched: false }); memoryCards.push({ id: w.en, content: w.zh[0], type: 'zh', matched: false }); });
        memoryCards.sort(() => Math.random() - 0.5); memoryFlipped = []; memoryLocked = false; memoryMatchedCount = 0;
        switchView('memory'); renderMemoryBoard(); document.getElementById('memory-message').innerText = '點擊卡片翻面...';
    }
    function setupMemoryModeGuest() {
        let pool = [...practiceQueue]; if (pool.length < 2) return alert("翻卡遊戲至少需要 2 個單字！");
        pool.sort(() => Math.random() - 0.5); const selectedWords = pool.slice(0, 8); 
        memoryCards = []; selectedWords.forEach(w => { memoryCards.push({ id: w.en, content: w.en, type: 'en', matched: false }); memoryCards.push({ id: w.en, content: w.zh[0], type: 'zh', matched: false }); });
        memoryCards.sort(() => Math.random() - 0.5); memoryFlipped = []; memoryLocked = false; memoryMatchedCount = 0;
        switchView('memory'); renderMemoryBoard(); document.getElementById('memory-message').innerText = '點擊卡片翻面...';
    }
    function renderMemoryBoard() {
        const board = document.getElementById('memory-board'); board.innerHTML = '';
        memoryCards.forEach((card, index) => {
            const cardEl = document.createElement('div'); cardEl.className = `memory-card ${card.matched ? 'matched' : ''}`; cardEl.dataset.index = index;
            cardEl.innerHTML = `<div class="memory-inner"><div class="memory-front">${card.content}</div><div class="memory-back">?</div></div>`;
            cardEl.onclick = () => flipCard(index); board.appendChild(cardEl);
        });
    }
    function flipCard(index) {
        if (memoryLocked || memoryCards[index].matched || memoryFlipped.includes(index)) return;
        document.getElementById('memory-board').children[index].classList.add('flipped'); memoryFlipped.push(index);
        if (memoryFlipped.length === 2) checkMemoryMatch();
    }
    function checkMemoryMatch() {
        memoryLocked = true; const [idx1, idx2] = memoryFlipped, card1 = memoryCards[idx1], card2 = memoryCards[idx2], msg = document.getElementById('memory-message');
        if (card1.id === card2.id) {
            card1.matched = true; card2.matched = true; memoryMatchedCount += 2;
            document.getElementById('memory-board').children[idx1].classList.add('matched'); document.getElementById('memory-board').children[idx2].classList.add('matched');
            msg.innerText = '配對成功！'; msg.className = 'result-msg result-correct'; speakEnglishWord(card1.id);
            memoryFlipped = []; memoryLocked = false; if (memoryMatchedCount === memoryCards.length) setTimeout(() => endQuiz(), 500);
        } else {
            msg.innerText = '不匹配...'; msg.className = 'result-msg result-wrong';
            setTimeout(() => { document.getElementById('memory-board').children[idx1].classList.remove('flipped'); document.getElementById('memory-board').children[idx2].classList.remove('flipped'); memoryFlipped = []; memoryLocked = false; msg.innerText = ''; }, 1000);
        }
    }

    // =====================================
    // 6. YouGlish Mode
    // =====================================
    function setupYouglishMode() {
        practiceQueue = getPracticeWords(); 
        if (practiceQueue.length === 0) return;
        practiceQueue.sort(() => Math.random() - 0.5);
        currentCardIndex = 0;
        switchView('youglish');
        loadYouglishCard();
    }

    function loadYouglishCard() {
        if (!practiceQueue[currentCardIndex]) return;
        const word = practiceQueue[currentCardIndex];
        
        document.getElementById('yg-word').innerText = word.en;
        document.getElementById('yg-zh').innerText = word.zh.join(' / ');
        document.getElementById('yg-progress').innerText = `進度: ${currentCardIndex + 1} / ${practiceQueue.length}`;
        document.getElementById('yg-link-word').innerText = word.en;
        document.getElementById('yg-link').href = `https://youglish.com/pronounce/${encodeURIComponent(word.en)}/english`;
    }

    function nextYouglishCard() {
        if (currentCardIndex < practiceQueue.length - 1) { 
            currentCardIndex++; 
            loadYouglishCard();
        } else { 
            endQuiz();
        }
    }

    function prevYouglishCard() {
        if (currentCardIndex > 0) { 
            currentCardIndex--; 
            loadYouglishCard();
        } else { 
            alert("已經是第一個單字囉！"); 
        }
    }

    function quitYouglish() {
        quitPractice();
    }

    // 啟動入口
    window.onload = () => {
        // 先等一下，確保 LZString 腳本載入完成
        setTimeout(() => {
            if (!checkShareUrl()) {
                goHome(); 
            }
        }, 150); // 給 CDN 一點載入時間
    };
</script>

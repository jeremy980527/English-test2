<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilenVocab | 極簡英文練習</title>
    
    <script>
        window.isYgApiReady = false;
        window.onYouglishAPIReady = function() {
            window.isYgApiReady = true;
            console.log("YouGlish API 準備就緒");
        };
    </script>
    <script async src="https://youglish.com/public/emb/widget.js" charset="utf-8"></script>

    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --text-main: #e0e0e0;
            --text-sub: #888888;
            --accent: #ffffff;
            --accent-hover: #cccccc;
            --border: #333333;
            --success: #4caf50;
            --error: #f44336;
            --btn-primary: #3b82f6; 
            --btn-primary-hover: #2563eb;
            --btn-youglish: #e62117; 
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --warning: #ff9800;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        header { margin-bottom: 40px; text-align: center; letter-spacing: 2px; text-transform: uppercase; font-weight: 200; }
        h1 { font-size: 1.5rem; margin: 0; color: var(--accent); }
        h2 { font-size: 1.2rem; font-weight: 400; margin-bottom: 20px; }

        .nav-bar { margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-icon { background: none; border: none; color: var(--text-sub); cursor: pointer; font-size: 1rem; transition: color 0.3s; }
        .btn-icon:hover { color: var(--accent); }

        .card { background-color: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; transition: transform 0.2s, border-color 0.2s; }
        .book-item { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .book-item:hover { border-color: var(--text-sub); }
        .book-item.selected { border-color: var(--accent); background-color: #222; }
        .word-item { display: flex; justify-content: space-between; font-size: 0.95rem; padding: 10px 0; border-bottom: 1px solid #222; }
        .word-item:last-child { border-bottom: none; }
        .word-en { font-weight: 600; color: var(--accent); }
        .word-zh { color: var(--text-sub); font-size: 0.9rem; }

        input[type="text"], textarea { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text-main); padding: 10px 0; font-size: 1rem; margin-bottom: 20px; transition: border-color 0.3s; font-family: var(--font-family); }
        input[type="text"]:focus, textarea:focus { border-bottom-color: var(--accent); }
        textarea { border: 1px solid var(--border); border-radius: 8px; padding: 10px; min-height: 120px; margin-top: 10px; font-size: 0.9rem; line-height: 1.5; resize: vertical; }

        .btn { background-color: var(--accent); color: var(--bg-color); border: none; padding: 12px 24px; border-radius: 30px; font-weight: 600; cursor: pointer; font-size: 0.9rem; width: 100%; margin-top: 10px; transition: background 0.3s; }
        .btn:hover { background-color: var(--accent-hover); }
        .btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--border); }
        .btn-outline:hover { border-color: var(--accent); }
        .btn-small { padding: 5px 10px; font-size: 0.8rem; width: auto; margin: 0; }
        .btn-delete { background: transparent; color: #555; border: 1px solid #333; }
        .btn-delete:hover { color: var(--error); border-color: var(--error); background: transparent; }
        .btn-yg { border-color: var(--btn-youglish); color: var(--text-main); }
        .btn-yg:hover { background-color: var(--btn-youglish); border-color: var(--btn-youglish); color: white; }

        .practice-area { text-align: center; margin-top: 40px; position: relative; }
        .question-text { font-size: 2.2rem; margin-bottom: 30px; font-weight: 600; }
        .hint-text { color: var(--text-sub); margin-bottom: 10px; font-style: italic; height: 20px;}
        .progress-text { color: var(--text-sub); margin-top: 20px; font-size: 0.8rem; }

        #feedback-area, #mcq-feedback-area, #speaking-feedback-area { 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            animation: fadeIn 0.3s ease; 
            width: 100%; 
        }
        
        .big-icon { font-size: 4rem; margin-bottom: 15px; font-weight: bold; }
        .icon-correct { color: var(--success); }
        .icon-wrong { color: var(--error); }
        .result-status { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; }
        .status-correct { color: var(--success); }
        .status-wrong { color: var(--error); }
        .answer-reveal { font-size: 1.5rem; margin-bottom: 10px; color: var(--accent); display: flex; align-items: center; gap: 10px; justify-content: center; }
        .tts-btn-large { background: none; border: none; cursor: pointer; font-size: 1.5rem; color: var(--text-sub); }
        .tts-btn-large:hover { color: var(--accent); }
        .btn-next-big { background-color: var(--btn-primary); color: white; font-size: 1.1rem; padding: 15px; margin-top: 30px; border-radius: 8px; width: 100%; }
        .btn-next-big:hover { background-color: var(--btn-primary-hover); }

        .mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .btn-mcq { background: var(--card-bg); border: 1px solid var(--border); color: var(--text-main); padding: 20px; border-radius: 12px; font-size: 1.1rem; cursor: pointer; transition: all 0.2s; word-break: break-all; }
        .btn-mcq:hover { border-color: var(--accent); transform: translateY(-2px); }

        /* ======= Speaking Mode Styles ======= */
        .mic-btn {
            width: 100px; height: 100px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--card-bg);
            color: var(--text-main);
            font-size: 2.5rem;
            cursor: pointer;
            margin: 20px auto;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.3s;
        }
        .mic-btn.listening {
            border-color: var(--error);
            color: var(--error);
            box-shadow: 0 0 20px rgba(244, 67, 54, 0.4);
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .speaking-status { color: var(--text-sub); margin-top: 10px; height: 20px; }
        .score-circle {
            font-size: 3rem; font-weight: 800; color: var(--success);
            margin-bottom: 10px;
        }

        .yg-open-btn { display: block; width: 100%; padding: 20px; margin-bottom: 15px; background: #1a0000; border: 2px solid var(--btn-youglish); border-radius: 12px; color: white; font-size: 1rem; cursor: pointer; text-align: center; text-decoration: none; }
        .yg-word-display { font-size: 2.5rem; font-weight: bold; color: var(--accent); margin-bottom: 5px; }

        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 10px; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
        input[type="checkbox"] { accent-color: var(--accent); transform: scale(1.2); }
        .mode-badge { font-size: 0.75rem; background: var(--border); padding: 2px 8px; border-radius: 4px; margin-left: 10px; color: var(--text-sub); }
        .mode-badge.active { background: var(--warning); color: #000; font-weight: bold; }
        .import-section { margin-top: 15px; border: 1px dashed var(--border); padding: 15px; border-radius: 8px; }
        .import-trigger { font-size: 0.85rem; color: var(--text-sub); text-decoration: underline; cursor: pointer; text-align: right; display: block; margin-bottom: 5px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <header><h1>SilenVocab挑戰</h1></header>

    <div id="view-home">
        <div class="nav-bar"><h2>你的單字簿</h2></div>
        <div id="book-list"></div>
        <div style="margin-top:20px;">
            <input type="text" id="new-book-name" placeholder="輸入新單字簿名稱...">
            <div style="display: flex; justify-content: flex-end;"><span class="import-trigger" onclick="toggleImportArea()">▼ 批量匯入 (Import)</span></div>
            <div id="import-area" class="hidden import-section">
                <textarea id="import-content" placeholder="範例：theory - 學說"></textarea>
                <button class="btn btn-outline" onclick="addBookWithImport()">建立並匯入</button>
            </div>
            <button id="btn-create-simple" class="btn btn-outline" onclick="addBookSimple()">＋ 僅建立單字簿</button>
        </div>
        
        <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h2>選擇練習模式</h2>
            <div class="checkbox-wrapper" style="margin-bottom: 15px;" onclick="toggleSequential()">
                <input type="checkbox" id="sequential-toggle" style="pointer-events: none;">
                <label style="flex:1;">開啟「循序漸進」模式 (錯誤即重來)</label>
            </div>
            <div class="flex-row">
                <button class="btn" onclick="setupPractice('zh-to-en')">中翻英</button>
                <button class="btn" onclick="setupPractice('en-to-zh')">英翻中</button>
            </div>
            <div class="flex-row">
                <button class="btn btn-outline" onclick="setupMultipleChoice('en-to-zh')">選擇題(英)</button>
                <button class="btn btn-outline" onclick="setupMultipleChoice('zh-to-en')">選擇題(中)</button>
            </div>
            <div class="flex-row" style="margin-top: 10px;">
                <button class="btn btn-outline" onclick="setupPuzzleMode()">🧩 拼圖</button>
                <button class="btn btn-outline" onclick="setupMemoryMode()">🎴 翻卡</button>
            </div>
            <div class="flex-row" style="margin-top: 10px;">
                <button class="btn btn-outline btn-yg" onclick="setupYouglishMode()">📺 YouGlish 沉浸</button>
                <button class="btn btn-outline" style="border-color:#4caf50; color:#4caf50;" onclick="setupSpeakingMode()">🗣️ 口說挑戰</button>
            </div>
        </div>

        <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h2>網站設定</h2>
            <div class="card checkbox-wrapper" onclick="togglePronunciation()">
                <input type="checkbox" id="auto-pronounce-toggle" style="pointer-events: none;">
                <label style="flex:1;">自動朗讀英文單字 (建議開啟)</label>
            </div>
        </div>
    </div>

    <div id="view-edit" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="goHome()">← 返回</button>
            <h2 id="edit-book-title">編輯</h2>
            <button class="btn-icon btn-delete" onclick="deleteCurrentBook()">刪除</button>
        </div>
        <div class="card">
            <input type="text" id="input-en" placeholder="English">
            <input type="text" id="input-zh" placeholder="中文">
            <button class="btn btn-small" onclick="addWord()">加入</button>
        </div>
        <div id="word-list"></div>
    </div>

    <div id="view-practice" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="quitPractice()">✕ 結束</button>
            <span id="mode-display" style="color:var(--text-sub)"></span>
        </div>
        <div class="practice-area">
            <div id="interaction-area">
                <div class="hint-text" id="hint-display"></div>
                <div class="question-text" id="question-display"></div>
                <input type="text" id="answer-input" placeholder="輸入答案 (Enter 看解答)..." autocomplete="off">
                <button class="btn" onclick="checkAnswer()">送出</button>
            </div>
            <div id="feedback-area" class="hidden">
                <div id="feedback-icon" class="big-icon"></div>
                <div class="answer-reveal">正確答案: <span id="feedback-answer"></span> <button class="tts-btn-large" onclick="replayAudio()">🔊</button></div>
                <button class="btn btn-next-big" onclick="handleNextClick()">下一個</button>
            </div>
            <div class="progress-text" id="progress-display"></div>
        </div>
    </div>

    <div id="view-mcq" class="hidden">
        <div class="nav-bar"><button class="btn-icon" onclick="quitPractice()">✕ 結束</button></div>
        <div class="practice-area">
            <div id="mcq-interaction-area">
                <div class="question-text" id="mcq-question-display"></div>
                <div class="mcq-grid" id="mcq-options-area"></div>
            </div>
            <div id="mcq-feedback-area" class="hidden">
                <div id="mcq-feedback-icon" class="big-icon"></div>
                <div class="answer-reveal">答案: <span id="mcq-feedback-answer"></span></div>
                <button class="btn btn-next-big" onclick="handleMcqNextClick()">下一個</button>
            </div>
            <div class="progress-text" id="mcq-progress-display"></div>
        </div>
    </div>

    <div id="view-speaking" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="quitPractice()">✕ 結束</button>
            <span style="color:#4caf50">口說評分模式</span>
        </div>
        <div class="practice-area">
            <div id="speaking-interaction-area">
                <div class="question-text" id="speaking-word-display">Word</div>
                <div class="yg-zh-display" id="speaking-zh-display">中文意思</div>
                <button class="mic-btn" id="mic-btn" onclick="startSpeechRecognition()">🎤</button>
                <div class="speaking-status" id="speaking-status">點擊麥克風開始</div>
            </div>

            <div id="speaking-feedback-area" class="hidden">
                <div id="speaking-score" class="score-circle">--</div>
                <div id="speaking-feedback-msg" class="result-status"></div>
                <div class="answer-reveal" id="speaking-heard-text" style="color:var(--text-sub); font-size:1rem;"></div>
                <button class="btn btn-next-big" onclick="handleSpeakingNextClick()">下一個單字</button>
            </div>
            <div class="progress-text" id="speaking-progress"></div>
        </div>
    </div>

    <div id="view-puzzle" class="hidden">
        <div class="nav-bar"><button class="btn-icon" onclick="quitPractice()">✕ 結束</button></div>
        <div class="practice-area">
            <div class="question-text" id="puzzle-question"></div>
            <div id="puzzle-answer-area" class="puzzle-container"></div>
            <div id="puzzle-pool-area" class="puzzle-container"></div>
            <div class="result-msg" id="puzzle-message"></div>
        </div>
    </div>

    <div id="view-memory" class="hidden">
        <div class="nav-bar"><button class="btn-icon" onclick="quitPractice()">✕ 結束</button></div>
        <div id="memory-board" class="memory-grid"></div>
        <div class="result-msg" id="memory-message"></div>
    </div>

    <div id="view-youglish" class="hidden">
        <div class="nav-bar"><button class="btn-icon" onclick="quitYouglish()">← 返回</button></div>
        <div class="practice-area">
            <div class="yg-word-display" id="yg-word">word</div>
            <div class="yg-zh-display" id="yg-zh"></div>
            <a id="yg-link" href="#" target="_blank" class="yg-open-btn">📺 在 YouGlish 上聆聽 <div class="yg-btn-label">開啟新分頁 →</div></a>
            <div class="flex-row"><button class="btn btn-outline" onclick="prevYouglishCard()">上一個</button><button class="btn" onclick="nextYouglishCard()">下一個</button></div>
        </div>
    </div>

</div>

<script>
    // --- Data ---
    let books = JSON.parse(localStorage.getItem('sv_books')) || [];
    let autoPronounce = JSON.parse(localStorage.getItem('sv_autoPronounce')) ?? true; 
    let isSequentialMode = false;
    let practiceQueue = [], currentCardIndex = 0, initialQueueLength = 0, completedCount = 0;
    let currentMode = '', selectedBookIds = new Set(), lastAnswerCorrect = false;

    // Game States
    let puzzleCurrentWord = null, puzzleUserAnswer = [], puzzleSourceLetters = [];
    let memoryCards = [], memoryFlipped = [], memoryLocked = false, memoryMatchedCount = 0;

    // --- Core Logic ---
    function saveData() { localStorage.setItem('sv_books', JSON.stringify(books)); }
    function switchView(viewName) {
        views.forEach(v => {
            const el = document.getElementById(`view-${v}`);
            if(el) {
                if(v === viewName) el.classList.remove('hidden');
                else el.classList.add('hidden');
            }
        });
    }
    function goHome() { renderBookList(); renderSettings(); switchView('home'); }
    function quitPractice() { if ('speechSynthesis' in window) window.speechSynthesis.cancel(); goHome(); }
    function renderSettings() {
        document.getElementById('auto-pronounce-toggle').checked = autoPronounce;
        document.getElementById('sequential-toggle').checked = isSequentialMode;
    }
    function togglePronunciation() { autoPronounce = !autoPronounce; localStorage.setItem('sv_autoPronounce', autoPronounce); renderSettings(); }
    function toggleSequential() { isSequentialMode = !isSequentialMode; renderSettings(); }
    function speakEnglishWord(word) {
        if (!autoPronounce && !window.forceSpeak) return; 
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(word);
            utterance.lang = 'en-US'; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
        }
        window.forceSpeak = false;
    }
    function replayAudio() { window.forceSpeak = true; speakEnglishWord(practiceQueue[currentCardIndex].en); }

    // --- Book Management ---
    function renderBookList() {
        const list = document.getElementById('book-list'); list.innerHTML = '';
        books.forEach(book => {
            const div = document.createElement('div'); div.className = `card book-item ${selectedBookIds.has(book.id) ? 'selected' : ''}`;
            div.innerHTML = `<span><input type="checkbox" ${selectedBookIds.has(book.id)?'checked':''}> <strong>${book.name}</strong> (${book.words.length} 字)</span><button class="btn-icon">✎</button>`;
            div.onclick = (e) => {
                if(e.target.tagName === 'BUTTON') openEditBook(book.id);
                else { if(selectedBookIds.has(book.id)) selectedBookIds.delete(book.id); else selectedBookIds.add(book.id); renderBookList(); }
            };
            list.appendChild(div);
        });
    }
    function toggleImportArea() { document.getElementById('import-area').classList.toggle('hidden'); }
    function addBookSimple() { 
        const name = document.getElementById('new-book-name').value.trim();
        if(!name) return; books.push({id:Date.now(), name:name, words:[]}); saveData(); renderBookList();
    }
    function addBookWithImport() {
        const name = document.getElementById('new-book-name').value.trim();
        const text = document.getElementById('import-content').value.trim();
        if(!name || !text) return;
        const newWords = text.split('\n').map(line => {
            let parts = line.split('-');
            if(parts.length < 2) return null;
            return { en: parts[0].trim(), zh: parts[1].split(/[;；,，\/]/).map(s=>s.trim()) };
        }).filter(w => w);
        books.push({id:Date.now(), name:name, words:newWords}); saveData(); goHome();
    }
    function openEditBook(id) { currentBookId = id; document.getElementById('edit-book-title').innerText = books.find(b=>b.id===id).name; renderWordList(); switchView('edit'); }
    function renderWordList() {
        const book = books.find(b=>b.id===currentBookId); const list = document.getElementById('word-list'); list.innerHTML = '';
        book.words.forEach((w, i) => {
            const div = document.createElement('div'); div.className='word-item';
            div.innerHTML = `<div><b>${w.en}</b><br>${w.zh.join(', ')}</div><button class="btn-icon" onclick="deleteWord(${i})">✕</button>`;
            list.appendChild(div);
        });
    }
    function addWord() {
        const en = document.getElementById('input-en').value.trim();
        const zh = document.getElementById('input-zh').value.trim();
        if(!en || !zh) return;
        books.find(b=>b.id===currentBookId).words.push({en:en, zh:zh.split(/[;；,，\/]/).map(s=>s.trim())});
        saveData(); renderWordList();
    }
    function deleteWord(i) { books.find(b=>b.id===currentBookId).words.splice(i,1); saveData(); renderWordList(); }
    function deleteCurrentBook() { if(confirm('刪除整個單字簿?')) { books=books.filter(b=>b.id!==currentBookId); saveData(); goHome(); } }

    function getPracticeWords() {
        let queue = []; books.forEach(b => { if(selectedBookIds.has(b.id)) queue.push(...b.words); });
        if(queue.length===0) alert('請先選擇單字簿'); return queue;
    }

    // =====================================
    // 1. Standard Mode
    // =====================================
    function setupPractice(mode) {
        practiceQueue = getPracticeWords(); if(practiceQueue.length===0) return;
        if(!isSequentialMode) practiceQueue.sort(()=>Math.random()-0.5);
        currentMode = mode; currentCardIndex = 0; initialQueueLength = practiceQueue.length; completedCount = 0;
        document.getElementById('mode-display').innerText = mode==='zh-to-en'?'中翻英':'英翻中';
        switchView('practice'); showNextCard();
    }
    function showNextCard() {
        if(currentCardIndex >= practiceQueue.length) { alert('練習結束'); quitPractice(); return; }
        document.getElementById('interaction-area').style.display = 'block';
        document.getElementById('feedback-area').style.display = 'none';
        const word = practiceQueue[currentCardIndex];
        document.getElementById('question-display').innerText = currentMode==='zh-to-en'?word.zh.join(' / '):word.en;
        document.getElementById('answer-input').value = '';
        document.getElementById('progress-display').innerText = `進度: ${completedCount}/${initialQueueLength}`;
    }
    function checkAnswer() {
        const val = document.getElementById('answer-input').value.trim().toLowerCase();
        const word = practiceQueue[currentCardIndex];
        let correct = (currentMode==='zh-to-en') ? (val === word.en.toLowerCase()) : (word.zh.some(z=>z.includes(val)));
        lastAnswerCorrect = correct;
        if(!correct && !isSequentialMode) practiceQueue.push(word);
        document.getElementById('interaction-area').style.display = 'none';
        document.getElementById('feedback-area').style.display = 'flex';
        document.getElementById('feedback-icon').innerText = correct?'✅':'❌';
        document.getElementById('feedback-answer').innerText = word.en;
        speakEnglishWord(word.en);
    }
    function handleNextClick() {
        if(lastAnswerCorrect) completedCount++;
        if(isSequentialMode && !lastAnswerCorrect) { alert('重頭開始！'); currentCardIndex=0; completedCount=0; }
        else currentCardIndex++;
        showNextCard();
    }

    // =====================================
    // 2. Multiple Choice (MCQ)
    // =====================================
    function setupMultipleChoice(mode) {
        practiceQueue = getPracticeWords(); if(practiceQueue.length===0) return;
        let all = []; books.forEach(b=>all.push(...b.words)); if(all.length<4) {alert('單字不夠'); return;}
        if(!isSequentialMode) practiceQueue.sort(()=>Math.random()-0.5);
        currentMode = mode; currentCardIndex = 0; initialQueueLength = practiceQueue.length; completedCount = 0;
        switchView('mcq'); showMcqNextCard();
    }
    function showMcqNextCard() {
        if(currentCardIndex >= practiceQueue.length) { alert('結束'); quitPractice(); return; }
        document.getElementById('mcq-interaction-area').style.display = 'block';
        document.getElementById('mcq-feedback-area').style.display = 'none';
        const word = practiceQueue[currentCardIndex];
        document.getElementById('mcq-question-display').innerText = currentMode==='zh-to-en'?word.zh.join('/'):word.en;
        let options = [word];
        let all = []; books.forEach(b=>all.push(...b.words));
        while(options.length<4) {
            let r = all[Math.floor(Math.random()*all.length)];
            if(!options.find(o=>o.en===r.en)) options.push(r);
        }
        options.sort(()=>Math.random()-0.5);
        const area = document.getElementById('mcq-options-area'); area.innerHTML = '';
        options.forEach(o => {
            const btn = document.createElement('button'); btn.className='btn-mcq';
            btn.innerText = currentMode==='zh-to-en'?o.en : o.zh.join('/');
            btn.onclick = () => {
                lastAnswerCorrect = (o.en===word.en);
                if(!lastAnswerCorrect && !isSequentialMode) practiceQueue.push(word);
                document.getElementById('mcq-interaction-area').style.display='none';
                document.getElementById('mcq-feedback-area').style.display='flex';
                document.getElementById('mcq-feedback-icon').innerText = lastAnswerCorrect?'✅':'❌';
                document.getElementById('mcq-feedback-answer').innerText = word.en;
                speakEnglishWord(word.en);
            };
            area.appendChild(btn);
        });
        document.getElementById('mcq-progress-display').innerText = `進度: ${completedCount}/${initialQueueLength}`;
    }
    function handleMcqNextClick() {
        if(lastAnswerCorrect) completedCount++;
        if(isSequentialMode && !lastAnswerCorrect) { currentCardIndex=0; completedCount=0; }
        else currentCardIndex++;
        showMcqNextCard();
    }

    // =====================================
    // 3. NEW: Speaking challenge Mode 🗣️
    // =====================================
    let recognition = null;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
    }

    function setupSpeakingMode() {
        if (!recognition) return alert("您的瀏覽器不支援語音辨識功能，請使用 Chrome 瀏覽器。");
        practiceQueue = getPracticeWords(); if(practiceQueue.length===0) return;
        if(!isSequentialMode) practiceQueue.sort(()=>Math.random()-0.5);
        currentCardIndex = 0; initialQueueLength = practiceQueue.length; completedCount = 0;
        switchView('speaking');
        showNextSpeakingCard();
    }

    function showNextSpeakingCard() {
        if(currentCardIndex >= practiceQueue.length) { alert('口說挑戰結束！'); quitPractice(); return; }
        
        document.getElementById('speaking-interaction-area').style.display = 'block';
        document.getElementById('speaking-feedback-area').style.display = 'none';
        
        const word = practiceQueue[currentCardIndex];
        document.getElementById('speaking-word-display').innerText = word.en;
        document.getElementById('speaking-zh-display').innerText = word.zh.join(' / ');
        document.getElementById('speaking-status').innerText = '點擊麥克風開始念單字';
        document.getElementById('speaking-progress').innerText = `進度: ${completedCount}/${initialQueueLength}`;
        
        // 重聽發音 (讓用戶知道怎麼念)
        speakEnglishWord(word.en);
    }

    function startSpeechRecognition() {
        const btn = document.getElementById('mic-btn');
        const status = document.getElementById('speaking-status');
        
        try {
            recognition.start();
            btn.classList.add('listening');
            status.innerText = '正在聆聽中...';
        } catch(e) {
            console.log("Recognition already started");
        }

        recognition.onresult = function(event) {
            const heardWord = event.results[0][0].transcript.toLowerCase().replace(/[.,?!]/g, "");
            const confidence = event.results[0][0].confidence;
            const targetWord = practiceQueue[currentCardIndex].en.toLowerCase();
            
            btn.classList.remove('listening');
            processSpeakingResult(heardWord, targetWord, confidence);
        };

        recognition.onerror = function(event) {
            btn.classList.remove('listening');
            status.innerText = '辨識發生錯誤，再試一次';
        };

        recognition.onspeechend = function() {
            recognition.stop();
            btn.classList.remove('listening');
        };
    }

    function processSpeakingResult(heard, target, confidence) {
        document.getElementById('speaking-interaction-area').style.display = 'none';
        document.getElementById('speaking-feedback-area').style.display = 'flex';
        
        const scoreDisplay = document.getElementById('speaking-score');
        const msgDisplay = document.getElementById('speaking-feedback-msg');
        const heardDisplay = document.getElementById('speaking-heard-text');
        
        // 簡單的比對邏輯
        if (heard === target || target.includes(heard)) {
            lastAnswerCorrect = true;
            let finalScore = Math.round(confidence * 100);
            scoreDisplay.innerText = `${finalScore} 分`;
            scoreDisplay.style.color = 'var(--success)';
            msgDisplay.innerText = '發音非常標準！';
            heardDisplay.innerText = `辨識文字: "${heard}"`;
        } else {
            lastAnswerCorrect = false;
            scoreDisplay.innerText = `0 分`;
            scoreDisplay.style.color = 'var(--error)';
            msgDisplay.innerText = `發音不太對喔...`;
            heardDisplay.innerText = `我聽到的是: "${heard}"`;
            
            if (!isSequentialMode) practiceQueue.push(practiceQueue[currentCardIndex]);
        }
    }

    function handleSpeakingNextClick() {
        if(lastAnswerCorrect) completedCount++;
        if(isSequentialMode && !lastAnswerCorrect) { alert('重頭開始！'); currentCardIndex=0; completedCount=0; }
        else currentCardIndex++;
        showNextSpeakingCard();
    }

    // =====================================
    // 4. YouGlish Mode
    // =====================================
    function setupYouglishMode() {
        practiceQueue = getPracticeWords(); if(practiceQueue.length===0) return;
        practiceQueue.sort(()=>Math.random()-0.5); currentCardIndex = 0;
        switchView('youglish'); loadYouglishCard();
    }
    function loadYouglishCard() {
        const word = practiceQueue[currentCardIndex];
        document.getElementById('yg-word').innerText = word.en;
        document.getElementById('yg-zh').innerText = word.zh.join(' / ');
        document.getElementById('yg-link').href = `https://youglish.com/pronounce/${encodeURIComponent(word.en)}/english`;
    }
    function nextYouglishCard() { if(currentCardIndex < practiceQueue.length-1){ currentCardIndex++; loadYouglishCard();} }
    function prevYouglishCard() { if(currentCardIndex > 0){ currentCardIndex--; loadYouglishCard();} }
    function quitYouglish() { goHome(); }

    // =====================================
    // 5. 其他遊戲模式 (Puzzle/Memory 略)
    // =====================================
    // (此處保留上一版的 Puzzle 和 Memory 函數碼即可，邏輯相同)
    function setupPuzzleMode() { practiceQueue = getPracticeWords(); if(practiceQueue.length===0) return; currentCardIndex=0; switchView('puzzle'); loadPuzzleLevel(); }
    function loadPuzzleLevel() {
        if (currentCardIndex >= practiceQueue.length) { alert("結束"); quitPractice(); return; }
        puzzleCurrentWord = practiceQueue[currentCardIndex]; puzzleUserAnswer = [];
        let letters = puzzleCurrentWord.en.toLowerCase().split('').sort(()=>Math.random()-0.5);
        puzzleSourceLetters = letters.map((l, i) => ({ id: i, char: l, used: false }));
        document.getElementById('puzzle-question').innerText = puzzleCurrentWord.zh.join('/');
        renderPuzzleBoard();
    }
    function renderPuzzleBoard() {
        const ansArea = document.getElementById('puzzle-answer-area'), poolArea = document.getElementById('puzzle-pool-area');
        ansArea.innerHTML = ''; poolArea.innerHTML = '';
        puzzleUserAnswer.forEach((l, i) => {
            const t = document.createElement('div'); t.className = 'letter-tile'; t.innerText = l.char;
            t.onclick = () => { l.used=false; puzzleUserAnswer.splice(i,1); renderPuzzleBoard(); };
            ansArea.appendChild(t);
        });
        puzzleSourceLetters.forEach(l => {
            if(!l.used) {
                const t = document.createElement('div'); t.className = 'letter-tile'; t.innerText = l.char;
                t.onclick = () => { l.used=true; puzzleUserAnswer.push(l); renderPuzzleBoard(); checkPuzzle(); };
                poolArea.appendChild(t);
            }
        });
    }
    function checkPuzzle() {
        if(puzzleUserAnswer.length === puzzleCurrentWord.en.length) {
            if(puzzleUserAnswer.map(o=>o.char).join('') === puzzleCurrentWord.en.toLowerCase()) {
                speakEnglishWord(puzzleCurrentWord.en); setTimeout(() => { currentCardIndex++; loadPuzzleLevel(); }, 800);
            }
        }
    }

    function setupMemoryMode() {
        let pool = getPracticeWords(); if(pool.length<2) return;
        pool.sort(()=>Math.random()-0.5); const selected = pool.slice(0, 6);
        memoryCards = []; selected.forEach(w => {
            memoryCards.push({ id: w.en, content: w.en, matched: false });
            memoryCards.push({ id: w.en, content: w.zh[0], matched: false });
        });
        memoryCards.sort(()=>Math.random()-0.5); memoryFlipped = []; memoryLocked = false; memoryMatchedCount = 0;
        switchView('memory'); renderMemoryBoard();
    }
    function renderMemoryBoard() {
        const board = document.getElementById('memory-board'); board.innerHTML = '';
        memoryCards.forEach((card, index) => {
            const el = document.createElement('div'); el.className = `memory-card ${card.matched?'matched':''}`;
            el.innerHTML = `<div class="memory-inner"><div class="memory-front">${card.content}</div><div class="memory-back">?</div></div>`;
            el.onclick = () => {
                if(memoryLocked || card.matched || memoryFlipped.includes(index)) return;
                el.classList.add('flipped'); memoryFlipped.push(index);
                if(memoryFlipped.length===2) {
                    memoryLocked = true;
                    const [i1, i2] = memoryFlipped;
                    if(memoryCards[i1].id === memoryCards[i2].id) {
                        memoryCards[i1].matched = memoryCards[i2].matched = true;
                        memoryMatchedCount += 2; memoryFlipped = []; memoryLocked = false;
                        speakEnglishWord(memoryCards[i1].id);
                        if(memoryMatchedCount===memoryCards.length) alert('完成!');
                    } else {
                        setTimeout(() => {
                            board.children[i1].classList.remove('flipped');
                            board.children[i2].classList.remove('flipped');
                            memoryFlipped = []; memoryLocked = false;
                        }, 1000);
                    }
                }
            };
            board.appendChild(el);
        });
    }

    // --- Init ---
    goHome();
</script>
</body>

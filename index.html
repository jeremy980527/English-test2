<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilenVocab | 極簡英文練習</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --text-main: #e0e0e0;
            --text-sub: #888888;
            --accent: #ffffff;
            --accent-hover: #cccccc;
            --border: #333333;
            --success: #4caf50;
            --error: #f44336;
            --btn-primary: #3b82f6; 
            --btn-primary-hover: #2563eb;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --warning: #ff9800;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 200;
        }

        h1 { font-size: 1.5rem; margin: 0; color: var(--accent); }
        h2 { font-size: 1.2rem; font-weight: 400; margin-bottom: 20px; }

        .nav-bar {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.3s;
        }
        .btn-icon:hover { color: var(--accent); }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--btn-primary);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .book-item:hover { border-color: var(--text-sub); }
        .book-item.selected { border-color: var(--accent); background-color: #222; }

        .word-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }
        .word-item:last-child { border-bottom: none; }
        .word-en { font-weight: 600; color: var(--accent); }
        .word-zh { color: var(--text-sub); font-size: 0.9rem; }

        input[type="text"], textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 0;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: border-color 0.3s;
            font-family: var(--font-family);
        }
        input[type="text"]:focus, textarea:focus { border-bottom-color: var(--accent); }
        
        textarea {
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            min-height: 120px;
            margin-top: 10px;
            font-size: 0.9rem;
            line-height: 1.5;
            resize: vertical;
        }

        .btn {
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); }

        .choice-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .choice-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 22px;
            border-radius: 12px;
            font-size: 1.1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        .choice-btn:hover { border-color: var(--text-sub); background-color: #1a1a1a; }
        .choice-btn.correct { background-color: var(--success); border-color: var(--success); color: white; }
        .choice-btn.wrong { background-color: var(--error); border-color: var(--error); color: white; }

        .practice-area { text-align: center; margin-top: 20px; position: relative; }
        .question-text { font-size: 2.2rem; margin-bottom: 30px; font-weight: 600; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .hint-text { color: var(--text-sub); margin-bottom: 10px; font-style: italic; height: 20px;}
        .progress-text { color: var(--text-sub); margin-top: 20px; font-size: 0.8rem; }

        #feedback-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
        }
        .big-icon { font-size: 4rem; margin-bottom: 15px; font-weight: bold; }
        .icon-correct { color: var(--success); }
        .icon-wrong { color: var(--error); }
        
        .answer-reveal {
            font-size: 1.5rem;
            margin-bottom: 10px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
        }

        .puzzle-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }
        .letter-tile {
            width: 40px;
            height: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            background: var(--card-bg);
            color: var(--text-main);
        }

        .memory-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 20px;
        }
        .memory-card {
            height: 80px;
            perspective: 1000px;
            cursor: pointer;
        }
        .memory-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            border-radius: 8px;
        }
        .memory-card.flipped .memory-inner { transform: rotateY(180deg); }
        .memory-front, .memory-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: 1px solid var(--border);
        }
        .memory-back { background-color: #222; font-size: 1.5rem; }
        .memory-front { background-color: var(--card-bg); color: var(--accent); transform: rotateY(180deg); font-size: 0.8rem; padding: 5px; text-align: center; }

        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 10px; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none; }
        input[type="checkbox"] { accent-color: var(--accent); transform: scale(1.2); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body>

<div class="container">
    <header onclick="goHome()" style="cursor:pointer">
        <h1>SilenVocab</h1>
    </header>

    <div id="view-home">
        <div class="nav-bar"><h2>你的單字簿</h2></div>
        <div id="book-list"></div>
        <div style="margin-top:20px;">
            <input type="text" id="new-book-name" placeholder="輸入新單字簿名稱...">
            <div style="display: flex; justify-content: flex-end;">
                <span onclick="toggleImportArea()" style="font-size:0.8rem; color:var(--text-sub); text-decoration:underline; cursor:pointer">▼ 批量匯入</span>
            </div>
            <div id="import-area" class="hidden" style="margin-top:10px; border:1px dashed #333; padding:15px; border-radius:8px;">
                <textarea id="import-content" placeholder="格式: apple - 蘋果 (換行新增)"></textarea>
                <button class="btn btn-outline" onclick="addBookWithImport()">建立並匯入</button>
            </div>
            <button id="btn-create-simple" class="btn btn-outline" onclick="addBookSimple()">＋ 建立單字簿</button>
        </div>
        <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h2>模式選擇</h2>
            <div class="checkbox-wrapper" style="margin-bottom: 15px;" onclick="toggleSequential()">
                <input type="checkbox" id="sequential-toggle"> <label>循序漸進 (錯誤即重來)</label>
            </div>
            <div class="flex-row">
                <button class="btn" onclick="setupMCQ()">🔘 選擇題</button>
                <button class="btn" onclick="setupPractice('zh-to-en')">⌨️ 拼打模式</button>
            </div>
            <div class="flex-row">
                <button class="btn btn-outline" onclick="setupPuzzleMode()">🧩 拼圖模式</button>
                <button class="btn btn-outline" onclick="setupMemoryMode()">🎴 翻卡遊戲</button>
            </div>
        </div>
    </div>

    <div id="view-mcq-init" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="goHome()">← 返回</button>
            <h2>選擇題類型</h2>
        </div>
        <div class="card">
            <button class="btn" style="margin-bottom:15px" onclick="startMCQ('zh-to-en')">看中文 → 選英文</button>
            <button class="btn btn-outline" onclick="startMCQ('en-to-zh')">看英文 → 選中文</button>
        </div>
    </div>

    <div id="view-mcq-play" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="quitPractice()">✕ 結束</button>
            <span id="mcq-mode-display" style="color:var(--text-sub)"></span>
        </div>
        <div class="progress-container"><div id="mcq-progress-bar" class="progress-fill"></div></div>
        <div class="practice-area">
            <div class="question-text" id="mcq-question-display"></div>
            <div id="mcq-options-container" class="choice-grid"></div>
            <div class="progress-text" id="mcq-progress-text"></div>
        </div>
    </div>

    <div id="view-edit" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="goHome()">← 返回</button>
            <h2 id="edit-book-title"></h2>
            <button class="btn-icon" style="color:var(--error)" onclick="deleteCurrentBook()">刪除此簿</button>
        </div>
        <div class="card">
            <input type="text" id="input-en" placeholder="English Word">
            <input type="text" id="input-zh" placeholder="中文意思">
            <button class="btn" onclick="addWord()">加入單字</button>
        </div>
        <div id="word-list"></div>
    </div>

    <div id="view-practice" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="quitPractice()">✕ 結束</button>
            <span id="mode-display" style="color:var(--text-sub)"></span>
        </div>
        <div class="progress-container"><div id="practice-progress-bar" class="progress-fill"></div></div>
        <div class="practice-area">
            <div id="interaction-area">
                <div class="hint-text" id="hint-display"></div>
                <div class="question-text" id="question-display"></div>
                <input type="text" id="answer-input" placeholder="輸入答案..." autocomplete="off">
                <button class="btn" onclick="checkAnswer()">送出</button>
            </div>
            <div id="feedback-area" class="hidden">
                <div id="feedback-icon" class="big-icon"></div>
                <div class="answer-reveal"><span id="feedback-answer"></span></div>
                <button class="btn btn-primary" id="btn-next-action" onclick="handleNextClick()">下一個</button>
            </div>
            <div class="progress-text" id="progress-display"></div>
        </div>
    </div>

    <div id="view-puzzle" class="hidden">
        <div class="nav-bar"><button class="btn-icon" onclick="quitPractice()">✕ 結束</button><span>拼圖模式</span></div>
        <div class="practice-area">
            <div class="question-text" id="puzzle-question"></div>
            <div id="puzzle-answer-area" class="puzzle-container"></div>
            <div style="margin:20px 0; border-bottom:1px solid #333"></div>
            <div id="puzzle-pool-area" class="puzzle-container"></div>
            <div id="puzzle-message" style="height:30px; margin-top:10px"></div>
        </div>
    </div>

    <div id="view-memory" class="hidden">
        <div class="nav-bar"><button class="btn-icon" onclick="quitPractice()">✕ 結束</button><span>翻卡記憶</span></div>
        <div id="memory-board" class="memory-grid"></div>
        <div id="memory-message" style="text-align:center; margin-top:20px"></div>
    </div>

</div>

<script>
    let books = JSON.parse(localStorage.getItem('sv_books')) || [];
    let isSequentialMode = false;
    let selectedBookIds = new Set();
    let practiceQueue = [];
    let initialQueueLength = 0;
    let completedCount = 0;
    let currentCardIndex = 0;
    let currentMode = '';
    let currentBookId = null;
    let lastCorrect = false;

    function saveData() { localStorage.setItem('sv_books', JSON.stringify(books)); }

    const views = ['home', 'edit', 'practice', 'puzzle', 'memory', 'mcq-init', 'mcq-play'];
    function switchView(name) {
        views.forEach(v => { const el = document.getElementById(`view-${v}`); if(el) el.classList.add('hidden'); });
        document.getElementById(`view-${name}`).classList.remove('hidden');
    }

    function goHome() { renderBookList(); switchView('home'); }
    function quitPractice() { goHome(); }
    function toggleSequential() { isSequentialMode = !isSequentialMode; }
    function toggleImportArea() { document.getElementById('import-area').classList.toggle('hidden'); }

    // --- Book Management ---
    function renderBookList() {
        const list = document.getElementById('book-list');
        list.innerHTML = '';
        books.forEach(book => {
            const div = document.createElement('div');
            div.className = `card book-item ${selectedBookIds.has(book.id) ? 'selected' : ''}`;
            div.innerHTML = `
                <div class="checkbox-wrapper" style="flex:1"><input type="checkbox" ${selectedBookIds.has(book.id)?'checked':''}>
                <strong>${book.name}</strong> (${book.words.length} 字)</div>
                <button class="btn-icon" onclick="event.stopPropagation(); openEditBook(${book.id})">✎</button>
            `;
            div.onclick = () => {
                if(selectedBookIds.has(book.id)) selectedBookIds.delete(book.id);
                else selectedBookIds.add(book.id);
                renderBookList();
            };
            list.appendChild(div);
        });
    }

    function addBookSimple() {
        const n = document.getElementById('new-book-name').value.trim();
        if(!n) return;
        books.push({ id: Date.now(), name: n, words: [] });
        saveData(); document.getElementById('new-book-name').value=''; renderBookList();
    }

    function addBookWithImport() {
        const n = document.getElementById('new-book-name').value.trim();
        const c = document.getElementById('import-content').value.trim();
        if(!n || !c) return;
        const words = [];
        c.split('\n').forEach(line => {
            const parts = line.split(/[–-]/);
            if(parts.length >= 2) {
                const en = parts[0].trim();
                const zh = parts[1].trim().split(/[;；,，]/).map(s=>s.trim());
                if(en && zh[0]) words.push({ en, zh });
            }
        });
        books.push({ id: Date.now(), name: n, words });
        saveData(); goHome();
    }

    function openEditBook(id) {
        currentBookId = id;
        const b = books.find(x => x.id === id);
        document.getElementById('edit-book-title').innerText = b.name;
        renderWordList(); switchView('edit');
    }

    function renderWordList() {
        const b = books.find(x => x.id === currentBookId);
        const list = document.getElementById('word-list');
        list.innerHTML = '';
        [...b.words].reverse().forEach((w, i) => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<div><span class="word-en">${w.en}</span> - <span class="word-zh">${w.zh.join(', ')}</span></div>
                <button class="btn-icon" onclick="deleteWord(${b.words.length-1-i})">✕</button>`;
            list.appendChild(div);
        });
    }

    function addWord() {
        const en = document.getElementById('input-en').value.trim();
        const zh = document.getElementById('input-zh').value.trim();
        if(!en || !zh) return;
        const b = books.find(x => x.id === currentBookId);
        b.words.push({ en, zh: [zh] });
        saveData(); document.getElementById('input-en').value=''; document.getElementById('input-zh').value=''; renderWordList();
    }

    function deleteWord(idx) {
        const b = books.find(x => x.id === currentBookId);
        b.words.splice(idx, 1); saveData(); renderWordList();
    }

    function deleteCurrentBook() {
        if(!confirm("確定刪除此單字簿？")) return;
        books = books.filter(x => x.id !== currentBookId);
        saveData(); goHome();
    }

    function getPracticeWords() {
        let p = [];
        books.forEach(b => { if(selectedBookIds.has(b.id)) p.push(...b.words); });
        return p;
    }

    // --- MCQ Logic ---
    function setupMCQ() {
        if(getPracticeWords().length < 4) return alert("單字量不足 4 個");
        switchView('mcq-init');
    }

    function startMCQ(mode) {
        currentMode = mode;
        practiceQueue = getPracticeWords().sort(() => Math.random() - 0.5);
        initialQueueLength = practiceQueue.length;
        completedCount = 0;
        document.getElementById('mcq-mode-display').innerText = mode === 'zh-to-en' ? '中翻英 (選擇)' : '英翻中 (選擇)';
        switchView('mcq-play');
        showNextMCQ();
    }

    function showNextMCQ() {
        if (practiceQueue.length === 0) { alert("恭喜完成！"); return goHome(); }
        const progress = (completedCount / initialQueueLength) * 100;
        document.getElementById('mcq-progress-bar').style.width = `${progress}%`;
        document.getElementById('mcq-progress-text').innerText = `完成進度: ${completedCount} / ${initialQueueLength}`;

        const cur = practiceQueue[0];
        document.getElementById('mcq-question-display').innerText = currentMode === 'zh-to-en' ? cur.zh.join(' / ') : cur.en;

        let options = [cur];
        let pool = getPracticeWords().filter(w => w.en !== cur.en);
        let distractors = pool.sort(() => Math.random() - 0.5).slice(0, 3);
        options.push(...distractors);
        options.sort(() => Math.random() - 0.5);

        const container = document.getElementById('mcq-options-container');
        container.innerHTML = '';

        options.forEach((opt) => {
            const btn = document.createElement('button');
            btn.className = 'choice-btn';
            btn.innerText = currentMode === 'zh-to-en' ? opt.en : opt.zh[0];
            btn.onclick = () => handleMCQAnswer(btn, opt, cur);
            container.appendChild(btn);
        });

        if(currentMode === 'en-to-zh') speak(cur.en);
    }

    function handleMCQAnswer(btn, selected, correct) {
        const allBtns = document.querySelectorAll('.choice-btn');
        allBtns.forEach(b => b.style.pointerEvents = 'none');

        // 不論對錯，只要點選選項就發音，加強記憶
        speak(correct.en);

        if (selected.en === correct.en) {
            btn.classList.add('correct');
            completedCount++;
            practiceQueue.shift();
            setTimeout(showNextMCQ, 600);
        } else {
            btn.classList.add('wrong');
            btn.classList.add('shake');
            allBtns.forEach(b => {
                const txt = b.innerText.trim();
                if(txt === correct.en || correct.zh.includes(txt)) b.classList.add('correct');
            });
            const wrong = practiceQueue.shift();
            const idx = Math.min(practiceQueue.length, Math.floor(Math.random() * 3) + 2);
            practiceQueue.splice(idx, 0, wrong);
            setTimeout(showNextMCQ, 1500);
        }
    }

    // --- Key Events ---
    window.addEventListener('keydown', (e) => {
        const mcqView = document.getElementById('view-mcq-play');
        if (mcqView.classList.contains('hidden')) return;
        
        let targetIndex = -1;
        if (e.key === 'Insert') targetIndex = 0;
        else if (e.key === 'Delete') targetIndex = 1;
        else if (e.key === 'PageUp') { targetIndex = 2; e.preventDefault(); }
        else if (e.key === 'PageDown') { targetIndex = 3; e.preventDefault(); }
        
        if (targetIndex !== -1) {
            const buttons = document.querySelectorAll('#mcq-options-container .choice-btn');
            if (buttons[targetIndex] && buttons[targetIndex].style.pointerEvents !== 'none') {
                buttons[targetIndex].click();
            }
        }
    });

    // --- Typing Logic ---
    function setupPractice(mode) {
        currentMode = mode;
        practiceQueue = getPracticeWords();
        if(practiceQueue.length === 0) return alert("請先選單字簿");
        if(!isSequentialMode) practiceQueue.sort(() => Math.random() - 0.5);
        initialQueueLength = practiceQueue.length;
        completedCount = 0;
        currentCardIndex = 0;
        document.getElementById('mode-display').innerText = mode === 'zh-to-en' ? '中翻英 (拼寫)' : '英翻中';
        switchView('practice');
        showNextCard();
    }

    function showNextCard() {
        if (currentCardIndex >= practiceQueue.length) { alert("練習結束！"); return goHome(); }
        const w = practiceQueue[currentCardIndex];
        document.getElementById('interaction-area').classList.remove('hidden');
        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('answer-input').value = '';
        document.getElementById('practice-progress-bar').style.width = `${(completedCount/initialQueueLength)*100}%`;
        document.getElementById('progress-display').innerText = `進度: ${completedCount} / ${initialQueueLength}`;
        document.getElementById('question-display').innerText = currentMode === 'zh-to-en' ? w.zh.join(' / ') : w.en;
        document.getElementById('answer-input').focus();

        if(currentMode === 'en-to-zh') speak(w.en);
    }

    function checkAnswer() {
        const val = document.getElementById('answer-input').value.trim().toLowerCase();
        const w = practiceQueue[currentCardIndex];
        const correct = currentMode === 'zh-to-en' ? (val === w.en.toLowerCase()) : (w.zh.some(z => z.includes(val)));
        
        document.getElementById('interaction-area').classList.add('hidden');
        document.getElementById('feedback-area').classList.remove('hidden');
        const icon = document.getElementById('feedback-icon');
        document.getElementById('feedback-answer').innerText = `${w.en} - ${w.zh[0]}`;
        
        // 檢查答案時發音
        speak(w.en);

        if(correct) {
            icon.innerText = '✅'; icon.className = 'big-icon icon-correct';
            lastCorrect = true;
        } else {
            icon.innerText = '❌'; icon.className = 'big-icon icon-wrong';
            lastCorrect = false;
        }
    }

    function handleNextClick() {
        if(lastCorrect) { completedCount++; currentCardIndex++; }
        else {
            if(isSequentialMode) { alert("錯誤！重來！"); currentCardIndex = 0; completedCount = 0; }
            else { const w = practiceQueue.splice(currentCardIndex, 1)[0]; practiceQueue.push(w); }
        }
        showNextCard();
    }

    // --- Puzzle & Memory ---
    function setupPuzzleMode() {
        practiceQueue = getPracticeWords().sort(() => Math.random() - 0.5);
        if(practiceQueue.length === 0) return;
        currentCardIndex = 0;
        switchView('puzzle');
        loadPuzzle();
    }
    function loadPuzzle() {
        const w = practiceQueue[currentCardIndex];
        document.getElementById('puzzle-question').innerText = w.zh[0];
        let letters = w.en.toLowerCase().split('').sort(() => Math.random() - 0.5);
        let userAns = [];
        const render = () => {
            const ansArea = document.getElementById('puzzle-answer-area');
            const poolArea = document.getElementById('puzzle-pool-area');
            ansArea.innerHTML = ''; poolArea.innerHTML = '';
            w.en.split('').forEach((_, i) => {
                const box = document.createElement('div'); box.className = 'letter-tile';
                box.innerText = userAns[i] || '';
                box.onclick = () => { if(userAns[i]) { letters.push(userAns[i]); userAns.splice(i,1); render(); } };
                ansArea.appendChild(box);
            });
            letters.forEach((l, i) => {
                const box = document.createElement('div'); box.className = 'letter-tile'; box.innerText = l;
                box.onclick = () => { userAns.push(l); letters.splice(i,1); render(); check(); };
                poolArea.appendChild(box);
            });
        };
        const check = () => {
            if(userAns.join('') === w.en.toLowerCase()) {
                document.getElementById('puzzle-message').innerText = "✅ 正確！";
                speak(w.en);
                setTimeout(() => { 
                    document.getElementById('puzzle-message').innerText = "";
                    currentCardIndex++; 
                    if(currentCardIndex < practiceQueue.length) loadPuzzle(); 
                    else goHome(); 
                }, 1000);
            }
        };
        render();
    }

    function setupMemoryMode() {
        let pool = getPracticeWords().sort(() => Math.random() - 0.5).slice(0, 8);
        if(pool.length < 2) return alert("單字量不足");
        let cards = [];
        pool.forEach(x => { cards.push({id:x.en, text:x.en}, {id:x.en, text:x.zh[0]}); });
        cards.sort(() => Math.random() - 0.5);
        const board = document.getElementById('memory-board'); board.innerHTML = '';
        let flipped = [];
        cards.forEach(c => {
            const el = document.createElement('div'); el.className = 'memory-card';
            el.innerHTML = `<div class="memory-inner"><div class="memory-front">${c.text}</div><div class="memory-back">?</div></div>`;
            el.onclick = () => {
                if(flipped.length < 2 && !el.classList.contains('flipped')) {
                    el.classList.add('flipped'); flipped.push({c, el});
                    if(flipped.length === 2) {
                        // 不論對錯都先讀出單字
                        speak(c.id);
                        if(flipped[0].c.id === flipped[1].c.id) {
                            flipped = [];
                        } else {
                            setTimeout(() => { flipped.forEach(f => f.el.classList.remove('flipped')); flipped = []; }, 1000);
                        }
                    }
                }
            };
            board.appendChild(el);
        });
        switchView('memory');
    }

    function speak(t) {
        if(!window.speechSynthesis) return;
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t); 
        u.lang = 'en-US'; 
        u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }

    document.getElementById('answer-input').onkeypress = (e) => { if(e.key==='Enter') checkAnswer(); };
    goHome();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SilenVocab | 極簡英文練習</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #161616;
            --text-main: #e0e0e0;
            --text-sub: #888888;
            --accent: #ffffff;
            --accent-hover: #cccccc;
            --border: #333333;
            --success: #4caf50;
            --error: #f44336;
            --btn-primary: #3b82f6; 
            --btn-primary-hover: #2563eb;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --warning: #ff9800;
        }

        * { box-sizing: border-box; outline: none; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
        }

        header {
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 200;
        }

        h1 { font-size: 1.5rem; margin: 0; color: var(--accent); }
        h2 { font-size: 1.2rem; font-weight: 400; margin-bottom: 20px; }

        .nav-bar {
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-icon {
            background: none;
            border: none;
            color: var(--text-sub);
            cursor: pointer;
            font-size: 1rem;
            transition: color 0.3s;
        }
        .btn-icon:hover { color: var(--accent); }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--btn-primary);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Cards & Lists */
        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .book-item:hover { border-color: var(--text-sub); }
        .book-item.selected { border-color: var(--accent); background-color: #222; }

        .word-item {
            display: flex;
            justify-content: space-between;
            font-size: 0.95rem;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }
        .word-item:last-child { border-bottom: none; }
        .word-en { font-weight: 600; color: var(--accent); }
        .word-zh { color: var(--text-sub); font-size: 0.9rem; }
        .word-sentence-preview { font-size: 0.8rem; color: #555; font-style: italic; margin-top: 4px; display: block; }

        /* Inputs & Buttons */
        input[type="text"], textarea {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 0;
            font-size: 1rem;
            margin-bottom: 15px;
            transition: border-color 0.3s;
            font-family: var(--font-family);
        }
        input[type="text"]:focus, textarea:focus { border-bottom-color: var(--accent); }
        
        .btn {
            background-color: var(--accent);
            color: var(--bg-color);
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn:hover { background-color: var(--accent-hover); transform: translateY(-1px); }
        .btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .btn-outline:hover { border-color: var(--accent); }
        .btn-small { padding: 5px 10px; font-size: 0.8rem; width: auto; margin: 0; }

        /* Choice Grid */
        .choice-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .choice-btn {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }
        .choice-btn.correct { background-color: var(--success); border-color: var(--success); color: white; }
        .choice-btn.wrong { background-color: var(--error); border-color: var(--error); color: white; }

        /* Practice Area */
        .practice-area { text-align: center; margin-top: 20px; }
        .question-text { font-size: 1.8rem; margin-bottom: 25px; font-weight: 600; line-height: 1.4; display: flex; align-items: center; justify-content: center; min-height: 100px; }
        .cloze-blank { border-bottom: 2px solid var(--accent); color: var(--btn-primary); padding: 0 5px; font-weight: bold; }
        
        /* Loader */
        .loader { width: 16px; height: 16px; border: 2px solid #FFF; border-bottom-color: transparent; border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite; margin-right: 8px; vertical-align: middle; }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }
        .flex-row { display: flex; gap: 10px; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        .shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body>

<div class="container">
    <header onclick="goHome()" style="cursor:pointer"><h1>SilenVocab</h1></header>

    <div id="view-home">
        <div class="nav-bar"><h2>你的單字簿</h2></div>
        <div id="book-list"></div>
        <div style="margin-top:20px;">
            <input type="text" id="new-book-name" placeholder="輸入新單字簿名稱...">
            <div style="text-align:right"><span onclick="toggleImportArea()" style="font-size:0.8rem; cursor:pointer; text-decoration:underline; color:var(--text-sub)">▼ 批量匯入</span></div>
            <div id="import-area" class="hidden" style="margin-top:10px; border:1px dashed #333; padding:15px; border-radius:8px;">
                <textarea id="import-content" placeholder="格式: apple - 蘋果 | I eat an apple. (例句可不填)"></textarea>
                <button class="btn btn-outline" onclick="addBookWithImport()">建立並匯入</button>
            </div>
            <button class="btn btn-outline" onclick="addBookSimple()">＋ 建立單字簿</button>
        </div>
        
        <div style="margin-top: 40px; border-top: 1px solid var(--border); padding-top: 20px;">
            <h2>模式選擇</h2>
            <div class="flex-row">
                <button class="btn" onclick="setupMCQ()">🔘 選擇題</button>
                <button class="btn" onclick="setupPractice('cloze')">📝 克漏字</button>
            </div>
            <div class="flex-row">
                <button class="btn btn-outline" onclick="setupPractice('zh-to-en')">⌨️ 拼打 (中→英)</button>
                <button class="btn btn-outline" onclick="setupPractice('en-to-zh')">📖 拼打 (英→中)</button>
            </div>
        </div>
    </div>

    <div id="view-edit" class="hidden">
        <div class="nav-bar">
            <button class="btn-icon" onclick="goHome()">← 返回</button>
            <h2 id="edit-book-title"></h2>
            <button class="btn-icon" style="color:var(--error)" onclick="deleteCurrentBook()">刪除</button>
        </div>
        <div class="card">
            <input type="text" id="input-en" placeholder="英文單字">
            <input type="text" id="input-zh" placeholder="中文意思">
            <input type="text" id="input-sentence" placeholder="例句 (選填)">
            <div class="flex-row">
                <button class="btn btn-small btn-outline" onclick="autoFillCurrentWordSentence()">🔍 幫我找例句</button>
                <button class="btn btn-small" onclick="addWord()">加入單字</button>
            </div>
        </div>
        <div style="margin-bottom:15px">
            <button class="btn btn-small btn-outline" id="btn-autofill-all" onclick="autoFillAllSentences()">🚀 自動補全此簿所有例句 (AI)</button>
        </div>
        <div id="word-list"></div>
    </div>

    <div id="view-practice" class="hidden">
        <div class="nav-bar"><button class="btn-icon" onclick="quitPractice()">✕ 結束</button><span id="practice-mode-title" style="color:var(--text-sub)"></span></div>
        <div class="progress-container"><div id="practice-progress-bar" class="progress-fill"></div></div>
        <div class="practice-area">
            <div id="interaction-area">
                <div class="question-text" id="question-display"></div>
                <input type="text" id="answer-input" placeholder="輸入答案..." autocomplete="off">
                <button class="btn" onclick="checkAnswer()">送出</button>
            </div>
            <div id="feedback-area" class="hidden">
                <div id="feedback-icon" style="font-size:3rem; margin-bottom:10px"></div>
                <div id="feedback-answer" style="font-size:1.5rem; color:var(--accent); margin-bottom:20px"></div>
                <button class="btn btn-primary" onclick="handleNextClick()">下一個</button>
            </div>
        </div>
    </div>

    <div id="view-mcq-init" class="hidden">
        <div class="nav-bar"><button class="btn-icon" onclick="goHome()">← 返回</button><h2>選擇題</h2></div>
        <div class="card"><button class="btn" onclick="startMCQ('zh-to-en')">看中文 → 選英文</button><button class="btn btn-outline" onclick="startMCQ('en-to-zh')">看英文 → 選中文</button></div>
    </div>

    <div id="view-mcq-play" class="hidden">
        <div class="nav-bar"><button class="btn-icon" onclick="quitPractice()">✕ 結束</button><span id="mcq-title"></span></div>
        <div class="progress-container"><div id="mcq-progress-bar" class="progress-fill"></div></div>
        <div class="practice-area"><div class="question-text" id="mcq-q-display"></div><div id="mcq-options" class="choice-grid"></div></div>
    </div>
</div>

<script>
    let books = JSON.parse(localStorage.getItem('sv_books')) || [];
    let selectedBookIds = new Set();
    let practiceQueue = [];
    let initialCount = 0;
    let completedCount = 0;
    let currentCardIndex = 0;
    let currentMode = '';
    let currentBookId = null;
    let lastCorrect = false;

    function saveData() { localStorage.setItem('sv_books', JSON.stringify(books)); }

    const views = ['home', 'edit', 'practice', 'mcq-init', 'mcq-play'];
    function switchView(name) {
        views.forEach(v => { const el = document.getElementById(`view-${v}`); if(el) el.classList.add('hidden'); });
        document.getElementById(`view-${name}`).classList.remove('hidden');
    }

    function goHome() { renderBookList(); switchView('home'); }
    function quitPractice() { goHome(); }
    function toggleImportArea() { document.getElementById('import-area').classList.toggle('hidden'); }

    function renderBookList() {
        const list = document.getElementById('book-list');
        list.innerHTML = '';
        books.forEach(book => {
            const div = document.createElement('div');
            div.className = `card book-item ${selectedBookIds.has(book.id) ? 'selected' : ''}`;
            div.innerHTML = `
                <div style="flex:1"><input type="checkbox" ${selectedBookIds.has(book.id)?'checked':''}> <strong>${book.name}</strong> (${book.words.length})</div>
                <button class="btn-icon" onclick="event.stopPropagation(); openEditBook(${book.id})">✎</button>
            `;
            div.onclick = () => { if(selectedBookIds.has(book.id)) selectedBookIds.delete(book.id); else selectedBookIds.add(book.id); renderBookList(); };
            list.appendChild(div);
        });
    }

    function openEditBook(id) {
        currentBookId = id;
        const b = books.find(x => x.id === id);
        document.getElementById('edit-book-title').innerText = b.name;
        renderWordList(); switchView('edit');
    }

    function renderWordList() {
        const b = books.find(x => x.id === currentBookId);
        const list = document.getElementById('word-list');
        list.innerHTML = '';
        [...b.words].reverse().forEach((w, i) => {
            const div = document.createElement('div');
            div.className = 'word-item';
            div.innerHTML = `<div><span class="word-en">${w.en}</span> - <span class="word-zh">${w.zh.join(', ')}</span>
                <span class="word-sentence-preview">${w.sentence || '(無例句)'}</span></div>
                <button class="btn-icon" onclick="deleteWord(${b.words.length-1-i})">✕</button>`;
            list.appendChild(div);
        });
    }

    async function fetchExample(word) {
        try {
            const res = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
            const data = await res.json();
            if (data && data[0]) {
                for (let mean of data[0].meanings) {
                    for (let def of mean.definitions) {
                        if (def.example) return def.example;
                    }
                }
            }
        } catch (e) { console.error(e); }
        return "";
    }

    async function autoFillCurrentWordSentence() {
        const en = document.getElementById('input-en').value.trim();
        if(!en) return alert("請先輸入英文單字");
        const senInput = document.getElementById('input-sentence');
        senInput.placeholder = "搜尋中...";
        const ex = await fetchExample(en);
        if(ex) senInput.value = ex;
        else alert("找不到相關例句，請手動輸入。");
        senInput.placeholder = "例句 (選填)";
    }

    async function autoFillAllSentences() {
        const b = books.find(x => x.id === currentBookId);
        const targets = b.words.filter(w => !w.sentence);
        if(targets.length === 0) return alert("所有單字都已經有例句了！");
        if(!confirm(`即將連線網路為 ${targets.length} 個單字補全例句，是否繼續？`)) return;
        
        const btn = document.getElementById('btn-autofill-all');
        const originalText = btn.innerText;
        btn.disabled = true;
        
        for(let i=0; i<targets.length; i++) {
            btn.innerHTML = `<span class="loader"></span> 正在抓取 (${i+1}/${targets.length}): ${targets[i].en}`;
            const ex = await fetchExample(targets[i].en);
            if(ex) targets[i].sentence = ex;
            await new Promise(r => setTimeout(r, 200)); // 避免請求太快
        }
        
        saveData(); renderWordList();
        btn.innerText = originalText;
        btn.disabled = false;
        alert("補全完成！");
    }

    function addWord() {
        const en = document.getElementById('input-en').value.trim();
        const zh = document.getElementById('input-zh').value.trim();
        const sen = document.getElementById('input-sentence').value.trim();
        if(!en || !zh) return;
        const b = books.find(x => x.id === currentBookId);
        b.words.push({ en, zh: [zh], sentence: sen });
        saveData(); document.getElementById('input-en').value=''; document.getElementById('input-zh').value=''; document.getElementById('input-sentence').value=''; renderWordList();
    }

    function deleteWord(idx) {
        const b = books.find(x => x.id === currentBookId);
        b.words.splice(idx, 1); saveData(); renderWordList();
    }

    function addBookSimple() {
        const n = document.getElementById('new-book-name').value.trim();
        if(!n) return;
        books.push({ id: Date.now(), name: n, words: [] });
        saveData(); goHome();
    }

    function addBookWithImport() {
        const n = document.getElementById('new-book-name').value.trim();
        const c = document.getElementById('import-content').value.trim();
        if(!n || !c) return;
        const words = [];
        c.split('\n').forEach(line => {
            const parts = line.split(/[–-]/);
            if(parts.length >= 2) {
                const en = parts[0].trim();
                const rest = parts[1].split('|');
                const zh = rest[0].trim().split(/[;；,，]/).map(s=>s.trim());
                const sentence = rest[1] ? rest[1].trim() : "";
                words.push({ en, zh, sentence });
            }
        });
        books.push({ id: Date.now(), name: n, words });
        saveData(); goHome();
    }

    function setupPractice(mode) {
        currentMode = mode;
        let pool = [];
        books.forEach(b => { if(selectedBookIds.has(b.id)) pool.push(...b.words); });
        if(pool.length === 0) return alert("請先選擇單字簿");
        
        if(mode === 'cloze') {
            const hasSen = pool.filter(x => x.sentence);
            if(hasSen.length === 0) return alert("選取的單字都沒有例句！請先去編輯頁面點擊「自動補全例句」。");
            practiceQueue = [...hasSen];
        } else {
            practiceQueue = [...pool];
        }
        
        practiceQueue.sort(()=>Math.random()-0.5);
        initialCount = practiceQueue.length;
        completedCount = 0;
        currentCardIndex = 0;
        switchView('practice');
        showNextCard();
    }

    function showNextCard() {
        if(currentCardIndex >= practiceQueue.length) { alert("恭喜完成！"); return goHome(); }
        const w = practiceQueue[currentCardIndex];
        document.getElementById('interaction-area').classList.remove('hidden');
        document.getElementById('feedback-area').classList.add('hidden');
        document.getElementById('answer-input').value = '';
        document.getElementById('practice-progress-bar').style.width = `${(completedCount/initialCount)*100}%`;
        
        const qEl = document.getElementById('question-display');
        if(currentMode === 'cloze') {
            const regex = new RegExp(w.en, 'gi');
            const displaySen = w.sentence.replace(regex, `<span class="cloze-blank">_____</span>`);
            qEl.innerHTML = `<div style="font-size:1.4rem">${displaySen}<br><small style="color:#666">(${w.zh[0]})</small></div>`;
        } else {
            qEl.innerText = currentMode === 'zh-to-en' ? w.zh.join(' / ') : w.en;
        }
        document.getElementById('answer-input').focus();
    }

    function checkAnswer() {
        const val = document.getElementById('answer-input').value.trim().toLowerCase();
        const w = practiceQueue[currentCardIndex];
        const isCorrect = (currentMode === 'en-to-zh') ? w.zh.some(z => z.includes(val)) : (val === w.en.toLowerCase());
        
        document.getElementById('interaction-area').classList.add('hidden');
        document.getElementById('feedback-area').classList.remove('hidden');
        const icon = document.getElementById('feedback-icon');
        const ans = document.getElementById('feedback-answer');
        
        if(isCorrect) {
            icon.innerText = '✅'; ans.innerText = '答對了！';
            lastCorrect = true;
        } else {
            icon.innerText = '❌'; ans.innerText = `正確答案: ${w.en}`;
            lastCorrect = false;
        }
    }

    function handleNextClick() {
        if(lastCorrect) { completedCount++; currentCardIndex++; } 
        else { const w = practiceQueue.splice(currentCardIndex, 1)[0]; practiceQueue.push(w); }
        showNextCard();
    }

    function setupMCQ() { switchView('mcq-init'); }
    function startMCQ(m) {
        currentMode = m;
        let pool = []; books.forEach(b => { if(selectedBookIds.has(b.id)) pool.push(...b.words); });
        practiceQueue = [...pool].sort(()=>Math.random()-0.5);
        initialCount = practiceQueue.length;
        completedCount = 0;
        switchView('mcq-play');
        showNextMCQ();
    }
    function showNextMCQ() {
        if(practiceQueue.length === 0) return goHome();
        document.getElementById('mcq-progress-bar').style.width = `${(completedCount/initialCount)*100}%`;
        const cur = practiceQueue[0];
        document.getElementById('mcq-q-display').innerText = currentMode === 'zh-to-en' ? cur.zh[0] : cur.en;
        let opts = [cur, ...books[0].words.filter(x=>x.en!==cur.en).sort(()=>Math.random()-0.5).slice(0,3)];
        opts.sort(()=>Math.random()-0.5);
        const container = document.getElementById('mcq-options');
        container.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'choice-btn';
            b.innerText = currentMode === 'zh-to-en' ? o.en : o.zh[0];
            b.onclick = () => {
                if(o.en === cur.en) { b.classList.add('correct'); completedCount++; practiceQueue.shift(); setTimeout(showNextMCQ, 600); }
                else { b.classList.add('wrong'); b.classList.add('shake'); const w = practiceQueue.shift(); practiceQueue.push(w); setTimeout(showNextMCQ, 1200); }
            };
            container.appendChild(b);
        });
    }

    document.getElementById('answer-input').onkeypress = (e) => { if(e.key==='Enter') checkAnswer(); };
    goHome();
</script>
</body>
</html>
